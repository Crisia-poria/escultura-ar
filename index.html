<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Bolha digital sob metal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { position: fixed; inset: 0; width: 100% !important; height: 100% !important; }
    #tap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent; border: none; outline: none;
    }
    #tap::after {
      content: '';
      width: 44px; height: 44px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.12); }
    }
    #tap.hidden { display: none; }
    #err {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font: 11px/1.5 sans-serif;
      letter-spacing: 1px; display: none; text-align: center;
    }
  </style>
</head>
<body>
<button id="tap" aria-label="iniciar AR"></button>
<div id="err"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil orgânico ───────────────────────────────────────────
// rx = largura lateral, rz = altura acima do chão (inflado)
const PROFILE=[
  [0.00,0.025,0.020],
  [0.03,0.080,0.120],
  [0.07,0.135,0.220],
  [0.13,0.168,0.310],  // bulbo inferior largo
  [0.19,0.152,0.275],
  [0.25,0.102,0.165],  // cintura estreita
  [0.30,0.128,0.210],
  [0.36,0.178,0.320],  // quadril
  [0.42,0.192,0.345],  // ponto mais largo
  [0.47,0.165,0.290],
  [0.52,0.108,0.175],  // cintura
  [0.57,0.145,0.245],
  [0.63,0.188,0.335],  // peito
  [0.68,0.195,0.355],  // seção superior larga
  [0.73,0.170,0.300],
  [0.77,0.142,0.248],
  [0.82,0.175,0.308],
  [0.87,0.188,0.335],  // ombros
  [0.91,0.155,0.268],
  [0.95,0.105,0.178],
  [0.98,0.062,0.098],
  [1.00,0.025,0.025],
];
const HEIGHT=0.70,SLICES=64,STACKS=96;

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo(){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS,y=(t-0.5)*HEIGHT,[rx,rz]=interp(t);
    const e=0.005,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT),drz=(rzU-rzD)/(2*e*HEIGHT);
    for(let j=0;j<=SLICES;j++){
      const a=2*Math.PI*j/SLICES,ca=Math.cos(a),sa=Math.sin(a);
      pos.push(rx*ca,rz*sa,-(t-0.5)*HEIGHT);
      const[tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2,ny=tz1*tx2-tx1*tz2,nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,nz/nl,-ny/nl);
      uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;
    idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.01,20);

// ── Shader iridescente + glow radiante ───────────────────────
const mat=new THREE.ShaderMaterial({
  transparent:true,
  blending:THREE.AdditiveBlending,
  side:THREE.DoubleSide,
  depthWrite:false,
  uniforms:{uTime:{value:0},uTouch:{value:-99},uHue:{value:0},uReveal:{value:0},uHand:{value:-1}},
  vertexShader:`
    uniform float uTime,uTouch,uReveal,uHand;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;

    // Noise simples (hash + smooth)
    float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float noise(vec2 p){
      vec2 i=floor(p),f=fract(p);
      f=f*f*(3.-2.*f);
      float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));
      return mix(mix(a,b,f.x),mix(c,d,f.x),f.y);
    }

    void main(){
      vUv=uv;

      float dt=uTime-uTouch;
      float alive=step(dt,5.);
      // Onda de toque: propaga devagar pela superfície (velocidade ~0.4 uv/s)
      float waveFront=dt*.38;
      float distFromFront=abs(vUv.y-waveFront);
      float touchWave=exp(-distFromFront*distFromFront*18.)*alive*
                      sin(dt*3.5-vUv.y*9.)*max(0.,1.-dt*.22);

      // Respiração lenta permanente
      float breathe=sin(uTime*.55+vUv.y*2.2)*0.008
                   +sin(uTime*.31+vUv.x*3.1)*0.005;

      // Tensão de mão: superfície atrai suavemente
      float hs=max(0.,1.-uHand*2.5)*step(0.,uHand)*step(uHand,.4);
      float handPull=hs*0.018*sin(uTime*2.8+vUv.y*5.);

      // Noise líquido lento sempre presente
      float n=noise(vUv*3.+vec2(uTime*.18,uTime*.11));
      float liqNoise=(n-.5)*0.012;

      float disp=(touchWave*0.032+breathe+handPull+liqNoise)*uReveal;
      vDisp=disp;

      vec3 displaced=position+normal*disp;
      vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(displaced,1.);
      vV=normalize(-mv.xyz);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHue,uReveal,uHand;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    void main(){
      if(uReveal<=0.)discard;
      vec3 N=normalize(vN);vec3 V=normalize(vV);
      float NdotV=abs(dot(N,V));
      float rim=pow(1.-NdotV,1.2);
      float inner=pow(NdotV,1.5);

      float dt=uTime-uTouch,alive=step(dt,5.);
      float decay=max(0.,1.-dt*.28)*alive;
      float hs=max(0.,1.-uHand*2.5)*step(0.,uHand)*step(uHand,.4);

      // Shift de cor na frente da onda de toque
      float waveFront=dt*.38;
      float waveGlow=exp(-abs(vUv.y-waveFront)*abs(vUv.y-waveFront)*12.)*decay;

      float ph=rim*7.+vUv.y*2.8-uTime*.45+vDisp*40.+decay*3.+uHue+waveGlow*2.;
      vec3 iri=vec3(.5+.5*cos(ph),.5+.5*cos(ph+2.094),.5+.5*cos(ph+4.189));

      float pulse=.5+.5*sin(uTime*1.8);
      float breathe=.5+.5*sin(uTime*.6+vUv.y*3.);

      vec3 innerLight=vec3(.55,.82,1.)*inner*(0.5+0.5*breathe)*(1.+decay*1.2+hs*1.2);
      vec3 waveLight=iri*waveGlow*1.5;
      vec3 rimCol=iri*(0.6+rim*.9+pulse*rim*.5+decay*.6+hs*.7);

      vec3 col=(innerLight+rimCol+waveLight)*uReveal;
      float a=(rim*.8+inner*.5+pulse*rim*.3+decay*.4+hs*.4+waveGlow*.3)*uReveal;
      gl_FragColor=vec4(col,clamp(a,0.,1.));
    }`
});

// ── Som de alumínio (Web Audio) ───────────────────────────────
let audioCtx=null;
function playMetal(intensity=1.0){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const ac=audioCtx;
  const now=ac.currentTime;
  const dur=3.2;

  // Ruído branco filtrado → textura de chacoalhar/vibrar chapa de alumínio
  const bufSize=ac.sampleRate*dur;
  const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
  const data=buf.getChannelData(0);
  // Ruído com pequenas rajadas irregulares (simula tremor de chapa)
  for(let i=0;i<bufSize;i++){
    const jitter=Math.random()<0.004?Math.random()*6:1; // picos de chocalhar
    data[i]=(Math.random()*2-1)*jitter;
  }
  const src=ac.createBufferSource();
  src.buffer=buf;

  // Filtros em cascata: frequências graves/médias do alumínio (200-700Hz)
  const f1=ac.createBiquadFilter();
  f1.type='bandpass'; f1.frequency.value=280; f1.Q.value=3;
  const f2=ac.createBiquadFilter();
  f2.type='bandpass'; f2.frequency.value=520; f2.Q.value=5;
  const f3=ac.createBiquadFilter();
  f3.type='bandpass'; f3.frequency.value=1100; f3.Q.value=8;
  const fHigh=ac.createBiquadFilter();
  fHigh.type='highshelf'; fHigh.frequency.value=3000; fHigh.gain.value=-18; // corta agudos

  // Reverb simples via delay feedback
  const delay=ac.createDelay(0.4);
  delay.delayTime.value=0.07;
  const feedback=ac.createGain();
  feedback.gain.value=0.45;
  const wet=ac.createGain();
  wet.gain.value=0.35;

  const master=ac.createGain();
  master.gain.setValueAtTime(intensity*0.55,now);
  master.gain.setValueAtTime(intensity*0.55,now+0.05);
  master.gain.exponentialRampToValueAtTime(0.001,now+dur);

  // Cadeia: src → filtros → master → destino + loop de reverb
  src.connect(f1); f1.connect(f2); f2.connect(f3); f3.connect(fHigh);
  fHigh.connect(master);
  fHigh.connect(wet); wet.connect(delay); delay.connect(feedback); feedback.connect(delay);
  delay.connect(master);
  master.connect(ac.destination);

  src.start(now); src.stop(now+dur);
}

const mesh=new THREE.Mesh(buildGeo(),mat);
scene.add(mesh);

// ── Anel de varredura ─────────────────────────────────────────
const ringMat=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:0,side:THREE.DoubleSide});
const ring=new THREE.Mesh(new THREE.RingGeometry(0.18,0.22,64),ringMat);
ring.rotation.x=-Math.PI/2;
scene.add(ring);

// ── Joints das mãos (esferas) ─────────────────────────────────
const JOINT_NAMES=[
  'wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];
const handMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.55});
const jointGeo=new THREE.SphereGeometry(0.008,8,8);

function makeHandJoints(){
  return JOINT_NAMES.map(()=>{
    const s=new THREE.Mesh(jointGeo,handMat);
    s.visible=false;
    scene.add(s);
    return s;
  });
}
const handJointsL=makeHandJoints();
const handJointsR=makeHandJoints();

// ── Estado AR ─────────────────────────────────────────────────
let xrSess=null,xrRef=null,hitSrc=null;
let scanning=false,locked=false,scanAccum=0;
const clock=new THREE.Clock();
let hue=0,lastT=0,handWasInside=false;

const tapEl=document.getElementById('tap');
const errEl=document.getElementById('err');

function showErr(msg){errEl.innerHTML=msg;errEl.style.display='block';}

function updateHandJoints(frame,joints,hand,ref){
  let minD=-1;
  JOINT_NAMES.forEach((name,i)=>{
    const jt=hand.get(name);
    if(!jt){joints[i].visible=false;return;}
    const pose=frame.getJointPose(jt,ref);
    if(!pose){joints[i].visible=false;return;}
    const p=pose.transform.position;
    joints[i].position.set(p.x,p.y,p.z);
    joints[i].visible=true;
    // distância XZ ao centro da bolha
    if(locked){
      const dx=p.x-mesh.position.x,dz=p.z-mesh.position.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(minD<0||d<minD)minD=d;
    }
  });
  return minD;
}

function setupSession(session){
  xrSess=session;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.xr.setSession(session)
    .then(()=>session.requestReferenceSpace('local-floor'))
    .then(ref=>{
      xrRef=ref;
      return session.requestReferenceSpace('viewer')
        .then(vs=>session.requestHitTestSource({space:vs}))
        .catch(()=>null);
    }).then(hs=>{
      hitSrc=hs;
      scanning=true;locked=false;scanAccum=0;
      mat.uniforms.uReveal.value=0;
      lastT=clock.getElapsedTime();
      tapEl.classList.add('hidden');
      renderer.domElement.style.display='block';
    }).catch(e=>showErr(e.message));

  session.addEventListener('end',()=>{
    xrSess=null;xrRef=null;hitSrc=null;
    scanning=false;locked=false;scanAccum=0;
    mat.uniforms.uReveal.value=0;
    mat.uniforms.uHand.value=-1;
    ringMat.opacity=0;
    [...handJointsL,...handJointsR].forEach(j=>j.visible=false);
    renderer.domElement.style.display='none';
    tapEl.classList.remove('hidden');
  });
}

tapEl.addEventListener('click',()=>{
  if(xrSess)return;
  if(!navigator.xr){showErr('WebXR indisponível');return;}
  navigator.xr.requestSession('immersive-ar',{
    requiredFeatures:['local-floor'],
    optionalFeatures:['hit-test','hand-tracking','dom-overlay'],
    domOverlay:{root:document.body}
  }).then(setupSession).catch(e=>{alert('Erro: '+(e.message||e));});
});

// ── Loop ──────────────────────────────────────────────────────
renderer.setAnimationLoop((ts,frame)=>{
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,0.05);lastT=t;
  mat.uniforms.uTime.value=t;

  if(frame&&xrRef){

    // Varredura
    if(scanning&&hitSrc){
      const hits=frame.getHitTestResults(hitSrc);
      if(hits.length>0){
        const p=hits[0].getPose(xrRef);
        if(p){
          ring.position.set(p.transform.position.x,p.transform.position.y+0.003,p.transform.position.z);
          scanAccum+=dt;
          const prog=Math.min(scanAccum/2,1);
          ringMat.opacity=(0.3+prog*0.5)*(0.7+0.3*Math.sin(t*6));
          ring.scale.setScalar(1+0.06*Math.sin(t*5));
          if(scanAccum>=2){
            mesh.position.set(p.transform.position.x,p.transform.position.y,p.transform.position.z);
            scanning=false;locked=true;
            if(hitSrc){hitSrc.cancel();hitSrc=null;}
          }
        }
      } else {
        scanAccum=Math.max(0,scanAccum-dt*2);
        ringMat.opacity=Math.max(0,ringMat.opacity-dt*2);
      }
    }

    // Fade-in após lock
    if(locked){
      ringMat.opacity=Math.max(0,ringMat.opacity-dt*3);
      mat.uniforms.uReveal.value=Math.min(1,mat.uniforms.uReveal.value+dt*0.5);
    }

    // Mãos
    const sess=renderer.xr.getSession();
    let minD=-1;
    for(const src of sess.inputSources){

      // Controlador trigger → reage na bolha
      if(src.gamepad&&locked){
        const trigger=src.gamepad.buttons[0];
        if(trigger&&trigger.pressed&&mat.uniforms.uTime.value-mat.uniforms.uTouch.value>0.5){
          mat.uniforms.uTouch.value=t;
          hue+=Math.PI*0.72;
          mat.uniforms.uHue.value=hue;
          playMetal(0.8);
        }
      }

      // Hand tracking
      if(src.hand){
        const joints=src.handedness==='left'?handJointsL:handJointsR;
        const d=updateHandJoints(frame,joints,src.hand,xrRef);
        if(d>=0&&(minD<0||d<minD))minD=d;
      }
    }
    mat.uniforms.uHand.value=minD;
    // Som ao entrar na zona da bolha com a mão
    const handInside=minD>=0&&minD<0.4;
    if(handInside&&!handWasInside) playMetal(0.5);
    handWasInside=handInside;
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
