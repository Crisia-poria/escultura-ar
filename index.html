<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Metal e Bolha</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;}
    canvas{position:fixed;inset:0;width:100%!important;height:100%!important;}
    #tap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      cursor:pointer;background:transparent;border:none;outline:none;}
    #tap::after{content:'';width:44px;height:44px;border:1px solid rgba(255,255,255,.2);
      border-radius:50%;animation:br 3s ease-in-out infinite;}
    @keyframes br{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:.5;transform:scale(1.12);}}
    #tap.hidden{display:none;}
    #st{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,.7);font:13px/1.5 monospace;letter-spacing:.5px;
      display:none;text-align:center;pointer-events:none;
      text-shadow:0 1px 4px rgba(0,0,0,.8);}
    #exit{position:fixed;top:18px;right:18px;width:40px;height:40px;
      border-radius:50%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.3);
      cursor:pointer;display:none;align-items:center;justify-content:center;
      font-size:18px;color:rgba(255,255,255,.7);z-index:9999;}
  </style>
</head>
<body>
<button id="tap" aria-label="iniciar AR"></button>
<div id="st"></div>
<button id="exit" aria-label="sair">✕</button>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil ────────────────────────────────────────────────────
const PROFILE=[
  [0.00,0.010,0.008],[0.04,0.165,0.155],[0.10,0.330,0.315],
  [0.19,0.445,0.430],[0.29,0.490,0.475],[0.40,0.510,0.495],
  [0.50,0.515,0.500],[0.60,0.510,0.495],[0.71,0.488,0.472],
  [0.81,0.432,0.416],[0.90,0.318,0.302],[0.96,0.155,0.140],
  [1.00,0.010,0.008],
];
const HEIGHT=1.55,SLICES=80,STACKS=120,MAX_RX=0.515,MAX_RZ=0.500;

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo(){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS,[rx,rz]=interp(t);
    const e=0.004,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT),drz=(rzU-rzD)/(2*e*HEIGHT);
    for(let j=0;j<=SLICES;j++){
      const a=Math.PI*j/SLICES,ca=Math.cos(a),sa=Math.sin(a);
      const bx=Math.sin(a*.9+t*4.1)*.030+Math.sin(a*1.8-t*2.7)*.018;
      const bz=Math.sin(a*1.1+t*3.4)*.026+Math.sin(a*.7-t*5.0)*.015;
      pos.push((rx+bx)*ca,(rz+bz)*sa,-(t-.5)*HEIGHT);
      const[tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2,ny=tz1*tx2-tx1*tz2,nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,nz/nl,-ny/nl);uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);

// ── Shader bolha ──────────────────────────────────────────────
const mat=new THREE.ShaderMaterial({
  transparent:true,side:THREE.DoubleSide,depthWrite:false,
  blending:THREE.CustomBlending,blendEquation:THREE.AddEquation,
  blendSrc:THREE.SrcAlphaFactor,blendDst:THREE.OneMinusSrcAlphaFactor,
  uniforms:{uTime:{value:0},uTouch:{value:-99},uHue:{value:0},uReveal:{value:0},uWind:{value:0},uHand:{value:-1}},
  vertexShader:`
    uniform float uTime,uTouch,uReveal,uWind;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vUv=uv;
      float dt=uTime-uTouch,alive=step(dt,7.);
      float wf=dt*.30,dw=abs(uv.y-wf);
      float tw=exp(-dw*dw*15.)*alive*sin(dt*2.5-uv.y*5.)*max(0.,1.-dt*.13);
      float wind=sin(uTime*.7-uv.y*3.5+uWind)*.038*sin(uTime*.22+uv.x*2.);
      float br=sin(uTime*.42+uv.y*1.6)*.009+sin(uTime*.25+uv.x*2.1)*.006;
      float lq=(ns(uv*2.+vec2(uTime*.09,uTime*.06))-.5)*.012;
      float d=(tw*.022+br+wind+lq)*uReveal;
      vDisp=d;
      vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(position+normal*d,1.);
      vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHue,uReveal,uWind;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    void main(){
      if(uReveal<=0.)discard;
      vec3 N=normalize(vN),V=normalize(vV);
      float NdotV=abs(dot(N,V));
      float rim=pow(1.-NdotV,1.8),core=pow(NdotV,3.5);
      float dt=uTime-uTouch,alive=step(dt,7.);
      float decay=max(0.,1.-dt*.14)*alive;
      float waveGlow=exp(-pow(vUv.y-dt*.30,2.)*14.)*decay;
      float ph=rim*7.+vUv.y*3.-uTime*.28+vDisp*38.+uHue+waveGlow*2.;
      vec3 iri=vec3(.5+.32*cos(ph),.5+.32*cos(ph+2.09),.5+.32*cos(ph+4.19));
      float metalBase=pow(1.-vUv.y,3.)*uReveal;
      float metalPulse=(.5+.5*sin(uTime*1.1-vUv.y*5.))*pow(1.-vUv.y,1.5);
      float emanate=sin(vUv.y*6.28-uTime*1.4)*exp(-vUv.y*3.)*.5+.5;
      vec3 metalCol=vec3(.95,.65,.10)*(metalBase*.8+metalPulse*.5)
                   +vec3(.20,.50,.90)*emanate*pow(1.-vUv.y,2.)*.35;
      float windVis=sin(uTime*.7-vUv.y*3.5+uWind)*(.5+.5*sin(uTime*.22))*rim*.3;
      float pulse=.5+.5*sin(uTime*1.3);
      vec3 col=iri*(rim*.70+pulse*rim*.2+decay*.4+windVis)+metalCol
              +iri*waveGlow*1.8+vec3(.02,.06,.12)*core*.2;
      float a=(rim*.68+core*.05+waveGlow*.38+pulse*rim*.15+metalBase*.18+metalPulse*.10)*uReveal;
      gl_FragColor=vec4(col,clamp(a,0.,.85));
    }`
});

// ── Halo no chão ──────────────────────────────────────────────
const haloMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{uTime:{value:0},uReveal:{value:0}},
  vertexShader:`varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`uniform float uTime,uReveal;varying vec2 vU;
    void main(){float r=vU.x;float ph=r*5.-uTime*.4;
      vec3 c=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
      float a=(1.-r)*.28*(.5+.5*sin(uTime*1.2+r*6.))*uReveal;
      gl_FragColor=vec4(c,clamp(a,0.,.4));}`
});
const halo=new THREE.Mesh(new THREE.RingGeometry(.05,.58,80),haloMat);
halo.rotation.x=-Math.PI/2;halo.position.y=.004;scene.add(halo);

// ── Mesh bolha ────────────────────────────────────────────────
const mesh=new THREE.Mesh(buildGeo(),mat);scene.add(mesh);

// ── Pool de luz (cursor de posicionamento) ────────────────────
const poolMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{uTime:{value:0},uFill:{value:0}},
  vertexShader:`varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float uTime,uFill;varying vec2 vU;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      if(uFill<=0.)discard;
      vec2 uv=vU*2.-1.;float r=length(uv);
      if(r>1.)discard;
      float edge=1.-r;
      float ripple=sin(r*12.-uTime*2.8)*.5+.5;
      float spiral=sin(atan(uv.y,uv.x)*5.+uTime*1.2-r*8.)*.5+.5;
      float noise=ns(uv*3.+uTime*.3);
      float ph=r*4.-uTime*.5+spiral*2.;
      vec3 col=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
      float waveFront=uFill*1.3;
      float waveGlow=exp(-pow(r-waveFront,2.)*18.)*uFill;
      float a=(edge*edge*(ripple*.4+spiral*.3+noise*.3)*.18+waveGlow*.6)*uFill;
      gl_FragColor=vec4(col+waveGlow*.4,clamp(a,0.,.7));
    }`
});
const pool=new THREE.Mesh(new THREE.CircleGeometry(.7,80),poolMat);
pool.rotation.x=-Math.PI/2;scene.add(pool);

// ── Joints das mãos ───────────────────────────────────────────
const JNAMES=['wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];
const TIP_NAMES=new Set(['index-finger-tip','middle-finger-tip','thumb-tip','ring-finger-tip','pinky-finger-tip']);
const handMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:.38});
const jointGeo=new THREE.SphereGeometry(.007,8,8);
function makeJoints(){return JNAMES.map(()=>{const s=new THREE.Mesh(jointGeo,handMat);s.visible=false;scene.add(s);return s;});}
const handJointsL=makeJoints(),handJointsR=makeJoints();

// ── Som ───────────────────────────────────────────────────────
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function playMetalWobble(vol=1.0){
  ensureAudio();const ac=audioCtx,now=ac.currentTime,dur=4.0;
  const lfo=ac.createOscillator(),lfoG=ac.createGain();
  lfo.frequency.value=3.8;lfoG.gain.value=22;lfo.connect(lfoG);lfo.start(now);lfo.stop(now+dur);
  [[72,1.0],[144,.55],[216,.32],[340,.18],[560,.08]].forEach(([f,g])=>{
    const o=ac.createOscillator(),gn=ac.createGain();
    o.type='sawtooth';o.frequency.value=f;lfoG.connect(o.frequency);
    gn.gain.setValueAtTime(0,now);gn.gain.linearRampToValueAtTime(vol*g*.35,now+.05);
    gn.gain.exponentialRampToValueAtTime(.0001,now+dur);
    o.connect(gn);gn.connect(ac.destination);o.start(now);o.stop(now+dur);
  });
}

// ── Toque ─────────────────────────────────────────────────────
const prevD={left:2,right:2};
let hue=0;
function ellD(p){
  if(!locked)return 2;
  const lx=(p.x-mesh.position.x)/MAX_RX,ly=p.y/MAX_RZ,lz=(p.z-mesh.position.z)/(HEIGHT/2);
  return Math.sqrt(lx*lx+ly*ly+lz*lz);
}
function updateHands(frame,joints,hand,ref,side){
  JNAMES.forEach((name,i)=>{
    const jt=hand.get(name);
    if(!jt){joints[i].visible=false;return;}
    const pose=frame.getJointPose(jt,ref);
    if(!pose){joints[i].visible=false;return;}
    const p=pose.transform.position;
    joints[i].position.set(p.x,p.y,p.z);joints[i].visible=true;
    if(TIP_NAMES.has(name)&&locked){
      const d=ellD(p);
      if(prevD[side]>1.05&&d<=1.0){
        playMetalWobble(.9);mat.uniforms.uTouch.value=clock.getElapsedTime();
        hue+=Math.PI*.72;mat.uniforms.uHue.value=hue;
      }
      prevD[side]=d<prevD[side]?d:Math.min(2,prevD[side]+.03);
    }
  });
}

// ── Estado ────────────────────────────────────────────────────
let xrSess=null,xrRef=null,hitSrc=null;
let scanning=false,locked=false,scanAccum=0,needsPlace=false;
const clock=new THREE.Clock();
let lastT=0;

const tapEl=document.getElementById('tap');
const stEl=document.getElementById('st');
const exitEl=document.getElementById('exit');
function status(m){stEl.textContent=m;stEl.style.display=m?'block':'none';}

exitEl.addEventListener('click',()=>{
  if(xrSess){xrSess.end();}
});

function lockBubble(px,pz){
  mesh.position.set(px,0,pz);
  halo.position.set(px,.004,pz);
  pool.position.set(px,.003,pz);
  locked=true;scanning=false;
  poolMat.uniforms.uFill.value=0;
  if(hitSrc){hitSrc.cancel();hitSrc=null;}
  status('');
}

function setupSession(session){
  xrSess=session;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.xr.setSession(session)
    .then(()=>session.requestReferenceSpace('local-floor'))
    .then(ref=>{
      xrRef=ref;
      locked=false;scanning=true;scanAccum=0;needsPlace=true;
      mat.uniforms.uReveal.value=0;mat.uniforms.uHand.value=-1;
      haloMat.uniforms.uReveal.value=0;poolMat.uniforms.uFill.value=0;
      prevD.left=2;prevD.right=2;
      lastT=clock.getElapsedTime();
      tapEl.classList.add('hidden');
      renderer.domElement.style.display='block';
      exitEl.style.display='flex';
      status('Olhe para a escultura e aguarde…');
      return session.requestReferenceSpace('viewer')
        .then(vs=>session.requestHitTestSource({space:vs}))
        .catch(()=>null);
    })
    .then(hs=>{hitSrc=hs;})
    .catch(e=>status('Erro: '+e.message));

  session.addEventListener('end',()=>{
    xrSess=null;xrRef=null;hitSrc=null;
    scanning=false;locked=false;needsPlace=false;scanAccum=0;
    mat.uniforms.uReveal.value=0;mat.uniforms.uHand.value=-1;
    haloMat.uniforms.uReveal.value=0;poolMat.uniforms.uFill.value=0;
    [...handJointsL,...handJointsR].forEach(j=>{j.visible=false;});
    renderer.domElement.style.display='none';
    tapEl.classList.remove('hidden');
    exitEl.style.display='none';
    status('');
  });
}

tapEl.addEventListener('click',()=>{
  if(xrSess)return;
  if(!navigator.xr){alert('WebXR não disponível neste browser.');return;}
  ensureAudio();
  navigator.xr.requestSession('immersive-ar',{
    requiredFeatures:['local-floor'],
    optionalFeatures:['hit-test','hand-tracking','dom-overlay'],
    domOverlay:{root:document.body}
  }).then(setupSession).catch(e=>alert('Erro AR: '+(e.message||e)));
});

// ── Loop ──────────────────────────────────────────────────────
renderer.setAnimationLoop((ts,frame)=>{
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,.05);lastT=t;
  mat.uniforms.uTime.value=t;
  mat.uniforms.uWind.value=t;
  haloMat.uniforms.uTime.value=t;
  poolMat.uniforms.uTime.value=t;

  if(!frame||!xrRef){renderer.render(scene,camera);return;}

  const viewerPose=frame.getViewerPose(xrRef);

  // Posiciona bolha na direção do olhar no primeiro frame
  if(needsPlace&&viewerPose){
    const vt=viewerPose.transform;
    const q=vt.orientation;
    const fx=2*(q.x*q.z+q.w*q.y);
    const fz=-(1-2*(q.x*q.x+q.y*q.y));
    const fl=Math.sqrt(fx*fx+fz*fz)||1;
    const px=vt.position.x+(fx/fl)*1.5;
    const pz=vt.position.z+(fz/fl)*1.5;
    mesh.position.set(px,0,pz);
    halo.position.set(px,.004,pz);
    pool.position.set(px,.003,pz);
    locked=true;needsPlace=false;
  }

  // Revela bolha
  if(locked){
    const rev=Math.min(1,mat.uniforms.uReveal.value+dt*.4);
    mat.uniforms.uReveal.value=rev;
    haloMat.uniforms.uReveal.value=rev;
  }

  // Hit-test: pool de luz guia reposicionamento
  if(scanning&&hitSrc){
    const hits=frame.getHitTestResults(hitSrc);
    if(hits.length>0){
      const p=hits[0].getPose(xrRef);
      if(p){
        const hx=p.transform.position.x,hz=p.transform.position.z;
        pool.position.set(hx,.003,hz);
        scanAccum+=dt;
        poolMat.uniforms.uFill.value=Math.min(1,scanAccum/3);
        pool.scale.setScalar(1+.04*Math.sin(t*4));
        if(scanAccum>=3){lockBubble(hx,hz);}
      }
    } else {
      scanAccum=Math.max(0,scanAccum-dt*3);
      poolMat.uniforms.uFill.value=Math.min(1,scanAccum/3);
    }
  }

  // Mãos
  const sess=renderer.xr.getSession();
  if(sess){
    for(const src of sess.inputSources){
      if(src.hand){
        const side=src.handedness==='left'?'left':'right';
        const joints=side==='left'?handJointsL:handJointsR;
        updateHands(frame,joints,src.hand,xrRef,side);
      }
    }
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
