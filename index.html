<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Escultura AR — Crisia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a12; }
    model-viewer {
      width: 100%;
      height: 100vh;
      --poster-color: #0a0a12;
    }
    #ar-button {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 44px;
      border: 1px solid rgba(180,220,255,0.5);
      background: rgba(0,0,0,0.75);
      color: rgba(180,220,255,0.9);
      font-size: 13px;
      letter-spacing: 3px;
      cursor: pointer;
      border-radius: 2px;
      font-family: sans-serif;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    #ar-button:active { background: rgba(100,180,255,0.2); }
  </style>
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
</head>
<body>

<model-viewer
  id="mv"
  src="./bubble.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  camera-controls
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="12deg"
  loading="eager"
  reveal="auto"
  shadow-intensity="0"
  exposure="2.0"
  tone-mapping="commerce"
  environment-image="legacy"
  animation-name="pulse"
  autoplay
>
  <button id="ar-button" slot="ar-button">VER EM AR ✦</button>
</model-viewer>

</body>
</html>
