<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Escultura AR — Crisia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; font-family: sans-serif; }

    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* Poster (tela antes do modelo carregar) */
    #poster {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 10;
      background: rgba(0,0,0,0.92); color: white;
      pointer-events: none;
    }
    #poster h1 { font-size: 22px; font-weight: 300; letter-spacing: 4px; margin-bottom: 10px; }
    #poster p  { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center;
                  max-width: 260px; line-height: 1.8; margin-bottom: 28px; }

    /* Botão AR customizado — aparece sobre o model-viewer */
    #ar-button {
      position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
      padding: 14px 40px; border: 1px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.6); color: white; font-size: 14px;
      letter-spacing: 2px; cursor: pointer; border-radius: 2px;
      -webkit-tap-highlight-color: transparent;
      display: none; /* model-viewer mostra quando AR está disponível */
    }

    /* Mensagem quando AR não é suportado */
    #no-ar {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 12px; letter-spacing: 1px;
      text-align: center; max-width: 280px; display: none;
    }
  </style>

  <!-- model-viewer — Google's official web component for 3D/AR -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

<model-viewer
  id="mv"
  src="./bubble.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  camera-controls
  auto-rotate
  shadow-intensity="0"
  exposure="1.2"
  environment-image="neutral"
  slot="poster"
>
  <!-- Tela inicial (poster) -->
  <div id="poster" slot="poster">
    <h1>ESCULTURA AR</h1>
    <p>Aponte para a escultura.<br>Toque em AR para ver a bolha no mundo real.</p>
  </div>

  <!-- Botão AR customizado -->
  <button id="ar-button" slot="ar-button">VER EM AR</button>

  <!-- Mensagem de fallback -->
  <div id="no-ar" slot="ar-failure">
    AR não disponível neste dispositivo
  </div>
</model-viewer>

<script>
const mv = document.getElementById('mv');

// Mostrar poster até modelo carregar
mv.addEventListener('load', () => {
  document.getElementById('poster').style.display = 'none';
});

// Mostrar botão AR quando disponível
mv.addEventListener('ar-status', (e) => {
  if (e.detail.status === 'session-started') {
    document.getElementById('poster').style.display = 'none';
  }
});

// Se AR não for suportado, mostrar mensagem
mv.addEventListener('ar-modes-changed', () => {
  if (!mv.canActivateAR) {
    document.getElementById('no-ar').style.display = 'block';
  }
});
</script>

</body>
</html>
