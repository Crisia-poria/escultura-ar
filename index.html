<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Metal e Bolha</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    canvas { position: fixed; inset: 0; width: 100% !important; height: 100% !important; }
    #tap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent; border: none; outline: none;
    }
    #tap::after {
      content: '';
      width: 44px; height: 44px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(1.12); }
    }
    #tap.hidden { display: none; }
    #err {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.35); font: 11px/1.5 sans-serif;
      letter-spacing: 1px; display: none; text-align: center;
    }
  </style>
</head>
<body>
<button id="tap" aria-label="iniciar AR"></button>
<div id="err"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil: bolha de sabão gigante — esfera alongada suave ────
// Maior, redonda, quase esférica em corte transversal
const PROFILE=[
  [0.00, 0.010, 0.008],
  [0.04, 0.180, 0.165],
  [0.10, 0.360, 0.340],
  [0.18, 0.490, 0.470],
  [0.27, 0.555, 0.535],
  [0.37, 0.580, 0.560],
  [0.47, 0.590, 0.572],  // centro — mais largo
  [0.53, 0.590, 0.572],
  [0.63, 0.578, 0.558],
  [0.73, 0.540, 0.520],
  [0.82, 0.460, 0.438],
  [0.90, 0.320, 0.298],
  [0.96, 0.158, 0.142],
  [0.99, 0.040, 0.034],
  [1.00, 0.008, 0.006],
];
const HEIGHT=1.9, SLICES=80, STACKS=128;
const MAX_RX=0.590, MAX_RZ=0.572; // para cálculo de toque

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo(){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS;
    const[rx,rz]=interp(t);
    const e=0.004;
    const[rxU,rzU]=interp(Math.min(t+e,1));
    const[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT), drz=(rzU-rzD)/(2*e*HEIGHT);
    for(let j=0;j<=SLICES;j++){
      const a=2*Math.PI*j/SLICES, ca=Math.cos(a), sa=Math.sin(a);
      // Ondulação suave — bolha de sabão tem leve irregularidade, não lobular
      const bx=Math.sin(a*0.8+t*4.7)*0.038+Math.sin(a*1.9-t*3.2)*0.022+Math.sin(a*3.3+t*1.5)*0.010;
      const bz=Math.sin(a*1.1+t*3.5)*0.034+Math.sin(a*0.6-t*5.8)*0.020+Math.sin(a*2.7+t*2.1)*0.008;
      pos.push((rx+bx)*ca,(rz+bz)*sa,-(t-0.5)*HEIGHT);
      const[tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2, ny=tz1*tx2-tx1*tz2, nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,nz/nl,-ny/nl);
      uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j, b=a+SLICES+1;
    idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.01,20);

// ── Shader: bolha de sabão — iridescência suave + aura do metal ──
const mat=new THREE.ShaderMaterial({
  transparent:true,
  side:THREE.DoubleSide,
  depthWrite:false,
  blending:THREE.CustomBlending,
  blendEquation:THREE.AddEquation,
  blendSrc:THREE.SrcAlphaFactor,
  blendDst:THREE.OneMinusSrcAlphaFactor,
  uniforms:{uTime:{value:0},uTouch:{value:-99},uHue:{value:0},uReveal:{value:0},uHand:{value:-1}},
  vertexShader:`
    uniform float uTime,uTouch,uReveal,uHand;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;

    float h21(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float smn(vec2 p){
      vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h21(i),h21(i+vec2(1,0)),f.x),mix(h21(i+vec2(0,1)),h21(i+vec2(1,1)),f.x),f.y);
    }

    void main(){
      vUv=uv;
      float dt=uTime-uTouch, alive=step(dt,6.);
      float waveFront=dt*.32;
      float distW=abs(vUv.y-waveFront);
      float touchWave=exp(-distW*distW*18.)*alive*sin(dt*2.8-vUv.y*6.)*max(0.,1.-dt*.15);

      float breathe=sin(uTime*.45+vUv.y*1.8)*.009+sin(uTime*.27+vUv.x*2.3)*.005;

      float hs=max(0.,1.-uHand*2.5)*step(0.,uHand)*step(uHand,.4);
      float handPull=hs*.013*sin(uTime*2.2+vUv.y*3.5);

      float n=smn(vUv*2.2+vec2(uTime*.11,uTime*.07));
      float liq=(n-.5)*.012;

      float disp=(touchWave*.025+breathe+handPull+liq)*uReveal;
      vDisp=disp;

      vec3 displaced=position+normal*disp;
      vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(displaced,1.);
      vV=normalize(-mv.xyz);
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHue,uReveal,uHand;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    void main(){
      if(uReveal<=0.)discard;
      vec3 N=normalize(vN); vec3 V=normalize(vV);
      float NdotV=abs(dot(N,V));
      float rim=pow(1.-NdotV,2.0);
      float core=pow(NdotV,3.0);

      float dt=uTime-uTouch, alive=step(dt,6.);
      float decay=max(0.,1.-dt*.16)*alive;
      float hs=max(0.,1.-uHand*2.5)*step(0.,uHand)*step(uHand,.4);

      float waveFront=dt*.32;
      float waveGlow=exp(-pow(vUv.y-waveFront,2.)*16.)*decay;

      // Iridescência suave: paleta pastel, menos saturada
      float ph=rim*8.+vUv.y*1.8-uTime*.32+vDisp*45.+uHue+waveGlow*2.5;
      vec3 iri=vec3(
        .52+.28*cos(ph),
        .52+.28*cos(ph+2.42),
        .52+.28*cos(ph+4.71)
      );

      // Aura do metal: calor que sobe da escultura (vUv.y=0 = contato com metal)
      float metalContact=pow(1.-vUv.y,3.5); // mais forte na base
      float metalRise=max(0.,sin(vUv.y*3.14159-uTime*.7))*(1.-vUv.y)*.5;
      // Cor quente: âmbar/dourado onde toca o metal, esfria ao subir
      vec3 metalAura=mix(
        vec3(.82,.62,.22),  // âmbar dourado — temperatura do alumínio
        vec3(.38,.62,.82),  // azul frio — campo eletromagnético
        vUv.y
      )*(metalContact*.35+metalRise*.25);

      float pulse=.5+.5*sin(uTime*1.4);

      vec3 waveCol=iri*waveGlow*1.8;
      vec3 handCol=iri*hs*.6*(.5+.5*sin(uTime*3.5+vUv.y*7.));

      vec3 col=iri*(rim*.7+pulse*rim*.2+decay*.4)
              +metalAura
              +waveCol+handCol
              +vec3(.04,.10,.18)*core*.3;

      float a=(rim*.65+core*.06+waveGlow*.35+hs*.25+pulse*rim*.15+metalContact*.08)*uReveal;
      gl_FragColor=vec4(col,clamp(a,0.,.82));
    }`
});

// ── Som: arquivos WAV reais + fallback sintético ───────────────
let audioCtx=null, metalBuffers=[];
const rawFetches=[fetch('metal1.wav').then(r=>r.arrayBuffer()).catch(()=>null),
                  fetch('metal2.wav').then(r=>r.arrayBuffer()).catch(()=>null)];

async function initAudio(){
  if(audioCtx) return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const abs=await Promise.all(rawFetches);
  for(const ab of abs){
    if(!ab) continue;
    try{ metalBuffers.push(await audioCtx.decodeAudioData(ab)); }catch(e){}
  }
}

function playMetal(intensity=1.0){
  if(!audioCtx) return;
  if(audioCtx.state==='suspended') audioCtx.resume();
  if(metalBuffers.length>0){
    const buf=metalBuffers[Math.floor(Math.random()*metalBuffers.length)];
    const src=audioCtx.createBufferSource(), g=audioCtx.createGain();
    src.buffer=buf;
    g.gain.value=intensity*.8;
    src.connect(g); g.connect(audioCtx.destination);
    src.start();
  } else {
    // Fallback sintético se WAVs não carregaram
    const ac=audioCtx, now=ac.currentTime;
    [[195,.9],[390,.45],[585,.22]].forEach(([f,v])=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='triangle'; o.frequency.value=f;
      g.gain.setValueAtTime(intensity*v*.3,now);
      g.gain.exponentialRampToValueAtTime(.0001,now+2.5);
      o.connect(g); g.connect(ac.destination);
      o.start(now); o.stop(now+2.5);
    });
  }
}

const mesh=new THREE.Mesh(buildGeo(),mat);
scene.add(mesh);

// ── Anel de varredura ─────────────────────────────────────────
const ringMat=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:0,side:THREE.DoubleSide});
const ring=new THREE.Mesh(new THREE.RingGeometry(0.22,0.27,64),ringMat);
ring.rotation.x=-Math.PI/2;
scene.add(ring);

// ── Joints das mãos ───────────────────────────────────────────
const JOINT_NAMES=[
  'wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];
const handMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:0.4});
const jointGeo=new THREE.SphereGeometry(0.007,8,8);
function makeHandJoints(){
  return JOINT_NAMES.map(()=>{const s=new THREE.Mesh(jointGeo,handMat);s.visible=false;scene.add(s);return s;});
}
const handJointsL=makeHandJoints(), handJointsR=makeHandJoints();

// ── Detecção de toque na SUPERFÍCIE da bolha ──────────────────
// Verifica se um ponto cruzou a superfície (elipsoide) do exterior para interior
let prevEllD={left:2,right:2}; // começa fora
function ellipsoidDist(p){
  if(!locked) return 2;
  const lx=(p.x-mesh.position.x)/MAX_RX;
  const ly=(p.y-mesh.position.y)/MAX_RZ;
  const lz=(p.z-mesh.position.z)/(HEIGHT/2);
  return Math.sqrt(lx*lx+ly*ly+lz*lz);
}

// ── Pre-load image tracking ───────────────────────────────────
let sculptureTarget=null;
fetch('escultura-mask.png').then(r=>r.blob()).then(b=>createImageBitmap(b)).then(bm=>{sculptureTarget=bm;}).catch(()=>{});

// ── Estado AR ─────────────────────────────────────────────────
let xrSess=null,xrRef=null,hitSrc=null;
let scanning=false,locked=false,scanAccum=0;
const clock=new THREE.Clock();
let hue=0,lastT=0;
let imgStableFrames=0,imgSumX=0,imgSumZ=0;

const tapEl=document.getElementById('tap');
const errEl=document.getElementById('err');
function showErr(msg){errEl.innerHTML=msg;errEl.style.display='block';}

function updateHandJoints(frame,joints,hand,ref,side){
  let minD=-1;
  // Pontas de dedo que detectam toque na superfície
  const tipNames=['index-finger-tip','middle-finger-tip','thumb-tip'];
  let tipPos=null;

  JOINT_NAMES.forEach((name,i)=>{
    const jt=hand.get(name);
    if(!jt){joints[i].visible=false;return;}
    const pose=frame.getJointPose(jt,ref);
    if(!pose){joints[i].visible=false;return;}
    const p=pose.transform.position;
    joints[i].position.set(p.x,p.y,p.z);
    joints[i].visible=true;
    if(locked){
      const dx=p.x-mesh.position.x,dz=p.z-mesh.position.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(minD<0||d<minD)minD=d;
      if(name==='index-finger-tip') tipPos=p;
    }
  });

  // Detecção de toque na superfície por cruzamento do elipsoide
  if(tipPos&&locked){
    const d=ellipsoidDist(tipPos);
    const prev=prevEllD[side];
    if(prev>1.05&&d<=1.0){
      // Cruzou de fora para dentro = toque na superfície
      playMetal(0.9);
      mat.uniforms.uTouch.value=clock.getElapsedTime();
      hue+=Math.PI*0.72; mat.uniforms.uHue.value=hue;
    }
    prevEllD[side]=d;
  }

  return minD;
}

function setupSession(session){
  xrSess=session;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.xr.setSession(session)
    .then(()=>session.requestReferenceSpace('local-floor'))
    .then(ref=>{
      xrRef=ref;
      return session.requestReferenceSpace('viewer')
        .then(vs=>session.requestHitTestSource({space:vs}))
        .catch(()=>null);
    }).then(hs=>{
      hitSrc=hs;
      scanning=true; locked=false; scanAccum=0;
      mat.uniforms.uReveal.value=0;
      lastT=clock.getElapsedTime();
      tapEl.classList.add('hidden');
      renderer.domElement.style.display='block';
    }).catch(e=>showErr(e.message));

  session.addEventListener('end',()=>{
    xrSess=null; xrRef=null; hitSrc=null;
    scanning=false; locked=false; scanAccum=0;
    mat.uniforms.uReveal.value=0; mat.uniforms.uHand.value=-1;
    ringMat.opacity=0;
    [...handJointsL,...handJointsR].forEach(j=>j.visible=false);
    renderer.domElement.style.display='none';
    tapEl.classList.remove('hidden');
    imgStableFrames=0; imgSumX=0; imgSumZ=0;
    prevEllD={left:2,right:2};
  });
}

tapEl.addEventListener('click',async()=>{
  if(xrSess) return;
  if(!navigator.xr){showErr('WebXR indisponível');return;}
  await initAudio(); // inicia AudioContext no gesto do usuário
  const optFeatures=['hit-test','hand-tracking','dom-overlay'];
  const sessionOpts={
    requiredFeatures:['local-floor'],
    optionalFeatures:optFeatures,
    domOverlay:{root:document.body}
  };
  if(sculptureTarget){
    sessionOpts.optionalFeatures.push('image-tracking');
    sessionOpts.trackedImages=[{image:sculptureTarget,widthInMeters:0.45}];
  }
  // requestSession como PRIMEIRA call síncrona após await initAudio
  navigator.xr.requestSession('immersive-ar',sessionOpts)
    .then(setupSession)
    .catch(e=>{alert('Erro: '+(e.message||e));});
});

// ── Loop ──────────────────────────────────────────────────────
renderer.setAnimationLoop((ts,frame)=>{
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,0.05); lastT=t;
  mat.uniforms.uTime.value=t;

  if(frame&&xrRef){

    // Image tracking: 30 frames estáveis no chão
    if(frame.getImageTrackingResults&&!locked){
      for(const r of frame.getImageTrackingResults()){
        if(r.trackingState==='tracked'){
          const pose=frame.getPose(r.imageSpace,xrRef);
          if(pose&&pose.transform.position.y<0.25){
            imgStableFrames++; imgSumX+=pose.transform.position.x; imgSumZ+=pose.transform.position.z;
            if(imgStableFrames>=30){
              mesh.position.set(imgSumX/30,0,imgSumZ/30);
              locked=true; scanning=false; ringMat.opacity=0;
              if(hitSrc){hitSrc.cancel();hitSrc=null;}
            }
          } else { imgStableFrames=0; imgSumX=0; imgSumZ=0; }
        }
      }
    }

    // Hit-test fallback
    if(scanning&&hitSrc){
      const hits=frame.getHitTestResults(hitSrc);
      if(hits.length>0){
        const p=hits[0].getPose(xrRef);
        if(p){
          ring.position.set(p.transform.position.x,p.transform.position.y+.003,p.transform.position.z);
          scanAccum+=dt;
          const prog=Math.min(scanAccum/1.5,1);
          ringMat.opacity=(0.3+prog*.5)*(.7+.3*Math.sin(t*6));
          ring.scale.setScalar(1+.06*Math.sin(t*5));
          if(scanAccum>=1.5){
            mesh.position.set(p.transform.position.x,p.transform.position.y,p.transform.position.z);
            scanning=false; locked=true;
            if(hitSrc){hitSrc.cancel();hitSrc=null;}
          }
        }
      } else {
        scanAccum=Math.max(0,scanAccum-dt*2);
        ringMat.opacity=Math.max(0,ringMat.opacity-dt*2);
      }
    }

    if(locked){
      ringMat.opacity=Math.max(0,ringMat.opacity-dt*3);
      mat.uniforms.uReveal.value=Math.min(1,mat.uniforms.uReveal.value+dt*.4);
    }

    const sess=renderer.xr.getSession();
    let minD=-1;
    for(const src of sess.inputSources){
      // Trigger do controle: não ativa som — só muda cor
      if(src.gamepad&&locked){
        const trigger=src.gamepad.buttons[0];
        if(trigger&&trigger.pressed&&t-mat.uniforms.uTouch.value>0.5){
          mat.uniforms.uTouch.value=t;
          hue+=Math.PI*0.72; mat.uniforms.uHue.value=hue;
          // sem som por trigger — só por toque físico
        }
      }
      if(src.hand){
        const side=src.handedness==='left'?'left':'right';
        const joints=src.handedness==='left'?handJointsL:handJointsR;
        const d=updateHandJoints(frame,joints,src.hand,xrRef,side);
        if(d>=0&&(minD<0||d<minD)) minD=d;
      }
    }
    mat.uniforms.uHand.value=minD;
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
