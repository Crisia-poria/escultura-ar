<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Bolha digital sob metal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
    canvas { position: fixed; inset: 0; width: 100% !important; height: 100% !important; }
    #tap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #tap::after {
      content: '';
      width: 48px; height: 48px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 50%;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.18; transform: scale(1); }
      50%      { opacity: 0.45; transform: scale(1.15); }
    }
    #tap.hidden { display: none; }
    #err {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font: 11px/1 sans-serif; letter-spacing: 2px;
      display: none;
    }
  </style>
</head>
<body>
<div id="tap"></div>
<div id="err"></div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil orgânico da escultura ─────────────────────────────
const PROFILE = [
  [0.00,0.018,0.013],[0.03,0.060,0.045],[0.07,0.105,0.078],
  [0.13,0.128,0.095],[0.19,0.118,0.088],[0.25,0.082,0.060],
  [0.30,0.100,0.074],[0.36,0.138,0.102],[0.42,0.148,0.110],
  [0.47,0.128,0.094],[0.52,0.086,0.063],[0.57,0.112,0.082],
  [0.63,0.146,0.107],[0.68,0.152,0.112],[0.73,0.132,0.097],
  [0.77,0.112,0.082],[0.82,0.138,0.101],[0.87,0.148,0.108],
  [0.91,0.120,0.088],[0.95,0.082,0.060],[0.98,0.048,0.035],
  [1.00,0.018,0.013],
];
const HEIGHT=0.55, SLICES=56, STACKS=88;

function interp(t) {
  for (let i=0;i<PROFILE.length-1;i++) {
    const [t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if (t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo() {
  const pos=[],nor=[],uv=[],idx=[];
  for (let i=0;i<=STACKS;i++) {
    const t=i/STACKS, y=(t-0.5)*HEIGHT, [rx,rz]=interp(t);
    const e=0.005,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT), drz=(rzU-rzD)/(2*e*HEIGHT);
    for (let j=0;j<=SLICES;j++) {
      const a=2*Math.PI*j/SLICES, ca=Math.cos(a), sa=Math.sin(a);
      const vx=rx*ca, vz=rz*sa;
      // Rotação -90° em X baked: (x,y,z) → (x,z,-y)  [deitado no plano XZ]
      pos.push(vx, vz, -y);
      const [tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2, ny=tz1*tx2-tx1*tz2, nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      // mesma rotação nas normais
      nor.push(nx/nl, nz/nl, -ny/nl);
      uv.push(j/SLICES,t);
    }
  }
  for (let i=0;i<STACKS;i++) for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;
    idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx); return g;
}

// ── Renderer ─────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
// canvas visível apenas durante AR
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.01,20);

// ── Shader iridescente ───────────────────────────────────────
const mat=new THREE.ShaderMaterial({
  transparent:true, side:THREE.DoubleSide, depthWrite:false,
  uniforms:{uTime:{value:0},uTouch:{value:-99},uHand:{value:-1},uHue:{value:0}},
  vertexShader:`
    varying vec3 vN,vV; varying vec2 vUv;
    void main(){
      vUv=uv; vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(position,1.);
      vV=normalize(-mv.xyz); gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHand,uHue;
    varying vec3 vN,vV; varying vec2 vUv;
    void main(){
      float f=pow(1.-abs(dot(normalize(vN),normalize(vV))),1.3);

      float dt=uTime-uTouch, alive=step(dt,2.5);
      float decay=max(0.,1.-dt*.5)*alive;
      float tw=sin(dt*14.-vUv.y*10.)*decay*.65;

      float hs=max(0.,1.-uHand*6.)*step(0.,uHand)*step(uHand,.18);
      float hw=sin(uTime*18.-vUv.y*12.)*hs*.7;

      float ph=f*6.5+vUv.y*3.-uTime*.55+(tw+hw)*2.5+decay*3.+uHue;
      vec3 c=vec3(.5+.5*cos(ph),.5+.5*cos(ph+2.094),.5+.5*cos(ph+4.189));

      float pulse=.5+.5*sin(uTime*1.9);
      float ig=.5+.5*sin(uTime*.7+vUv.y*4.);
      vec3 col=c*(.15+f*.55)+c*pulse*f*.5+c*decay*.6+c*hs*.5
              +vec3(.3,.6,1.)*ig*(1.-abs(dot(normalize(vN),normalize(vV))))*.12;
      float a=clamp(.04+f*.6+pulse*f*.25+decay*.3+hs*.25,0.,.93);
      gl_FragColor=vec4(col,a);
    }`
});

const mesh=new THREE.Mesh(buildGeo(),mat);
scene.add(mesh);

// ── Raycaster (toque na bolha) ───────────────────────────────
const rc=new THREE.Raycaster(), pt=new THREE.Vector2();
const clock=new THREE.Clock();
let hue=0;

function onTap(e) {
  if (e.target===document.getElementById('tap')||e.target===document.body){
    startAR(); return;
  }
  const x=e.clientX??e.touches?.[0]?.clientX??0;
  const y=e.clientY??e.touches?.[0]?.clientY??0;
  pt.x=(x/innerWidth)*2-1; pt.y=-(y/innerHeight)*2+1;
  rc.setFromCamera(pt,camera);
  if (rc.intersectObject(mesh,false).length){
    mat.uniforms.uTouch.value=clock.getElapsedTime();
    hue+=Math.PI*.72; mat.uniforms.uHue.value=hue;
  }
}
window.addEventListener('pointerdown',onTap);

// ── AR ───────────────────────────────────────────────────────
let xrSess=null, xrRef=null, hitSrc=null, placed=false;
const tapEl=document.getElementById('tap');
const errEl=document.getElementById('err');

// Verifica suporte em background (não bloqueia gesto)
let arSupported = null;
if (navigator.xr) {
  navigator.xr.isSessionSupported('immersive-ar')
    .then(ok=>{ arSupported=ok; })
    .catch(()=>{ arSupported=false; });
}

async function startAR() {
  if (xrSess) return;

  const ua=navigator.userAgent;
  const isIOS=/iPhone|iPad|iPod/i.test(ua);
  const isSafari=isIOS&&/Safari/i.test(ua)&&!/CriOS|FxiOS|EdgiOS/i.test(ua);

  if (!navigator.xr) {
    errEl.innerHTML=isIOS&&!isSafari
      ? 'No iPhone: abra no <strong>Safari</strong>'
      : 'WebXR indisponível — use Quest Browser ou Chrome Android';
    errEl.style.display='block'; return;
  }

  if (arSupported===false) {
    errEl.innerHTML=isSafari
      ? 'Ative: Safari → Ajustes → Avançado → Recursos Experimentais → WebXR'
      : 'AR não suportado neste dispositivo';
    errEl.style.display='block'; return;
  }

  // requestSession chamado diretamente no gesto do usuário
  try {
    xrSess=await navigator.xr.requestSession('immersive-ar',{
      requiredFeatures:['local-floor'],
      optionalFeatures:['hit-test','dom-overlay','hand-tracking'],
      domOverlay:{root:document.body}
    });
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSess);
    xrRef=await xrSess.requestReferenceSpace('local-floor');

    // Hit-test: detecta superfície automaticamente
    try {
      const viewerSpace=await xrSess.requestReferenceSpace('viewer');
      hitSrc=await xrSess.requestHitTestSource({space:viewerSpace});
    } catch(_){}

    // Posição inicial antes do hit-test confirmar
    mesh.position.set(0,0.004,-0.85);
    placed=false;

    tapEl.classList.add('hidden');
    renderer.domElement.style.display='block';

    xrSess.addEventListener('end',()=>{
      xrSess=null; xrRef=null; hitSrc=null; placed=false;
      mat.uniforms.uHand.value=-1;
      renderer.domElement.style.display='none';
      tapEl.classList.remove('hidden');
    });
  } catch(e){
    errEl.textContent=e.message||'erro desconhecido'; errEl.style.display='block';
  }
}

// ── Loop ─────────────────────────────────────────────────────
const _hp=new THREE.Vector3();

renderer.setAnimationLoop((ts,frame)=>{
  mat.uniforms.uTime.value=clock.getElapsedTime();

  if (frame&&xrRef) {
    // Auto-posiciona via hit-test na superfície detectada
    if (hitSrc&&!placed) {
      const hits=frame.getHitTestResults(hitSrc);
      if (hits.length>0) {
        const p=hits[0].getPose(xrRef);
        if (p) {
          mesh.position.set(p.transform.position.x, p.transform.position.y+0.004, p.transform.position.z);
          placed=true;
          hitSrc.cancel(); hitSrc=null;
        }
      }
    }

    // Hand tracking (Quest 3)
    const sess=renderer.xr.getSession();
    let minD=-1;
    for (const src of sess.inputSources) {
      if (!src.hand) continue;
      const tip=src.hand.get('index-finger-tip');
      if (!tip) continue;
      const pose=frame.getJointPose(tip,xrRef);
      if (!pose) continue;
      const p=pose.transform.position;
      _hp.set(p.x,p.y,p.z);
      const d=_hp.distanceTo(mesh.position);
      if (minD<0||d<minD) minD=d;
    }
    mat.uniforms.uHand.value=minD;
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
