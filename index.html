<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Escultura AR — Crisia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; }

    model-viewer {
      width: 100%;
      height: 100vh;
      --poster-color: #111111;
    }

    #ar-button {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 44px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.7);
      color: white;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 2px;
      font-family: sans-serif;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    #ar-button:active {
      background: rgba(255,255,255,0.15);
    }

    .info {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      font-family: sans-serif;
      letter-spacing: 1px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>

  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
  </script>
</head>
<body>

<model-viewer
  id="mv"
  src="./bubble.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  camera-controls
  auto-rotate
  loading="eager"
  reveal="auto"
  shadow-intensity="0"
  exposure="1.5"
  environment-image="neutral"
  poster=""
>
  <span class="info" slot="ar-button">ESCULTURA AR — CRISIA</span>
  <button id="ar-button" slot="ar-button">VER EM AR ✦</button>
</model-viewer>

</body>
</html>
