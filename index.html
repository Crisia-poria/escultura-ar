<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Escultura AR — Crisia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #06060e; overflow: hidden; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #ui {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center; padding-bottom: 44px; gap: 12px;
      pointer-events: none;
    }
    #label {
      color: rgba(140,200,255,0.5); font-size: 11px; letter-spacing: 3px;
      font-family: sans-serif;
    }
    #ar-btn {
      pointer-events: all;
      padding: 14px 52px;
      border: 1px solid rgba(140,200,255,0.55);
      background: rgba(0,0,10,0.75);
      color: rgba(140,200,255,0.9);
      font-size: 13px; letter-spacing: 3px; font-family: sans-serif;
      cursor: pointer; border-radius: 2px; -webkit-tap-highlight-color: transparent;
    }
    #ar-btn:active { background: rgba(80,150,255,0.2); }
    #ar-btn:disabled { opacity: 0.35; cursor: default; }
    #msg {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(140,200,255,0.55); font-size: 11px; letter-spacing: 2px;
      font-family: sans-serif; text-align: center; white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="msg">ESCULTURA AR — CRISIA</div>
<div id="ui">
  <span id="label">aponta para a escultura</span>
  <button id="ar-btn">VER EM AR ✦</button>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

// ── Organic profile (sculpture silhouette) ────────────────────
const PROFILE = [
  [0.00, 0.018, 0.013], [0.03, 0.060, 0.045], [0.07, 0.105, 0.078],
  [0.13, 0.128, 0.095], [0.19, 0.118, 0.088], [0.25, 0.082, 0.060],
  [0.30, 0.100, 0.074], [0.36, 0.138, 0.102], [0.42, 0.148, 0.110],
  [0.47, 0.128, 0.094], [0.52, 0.086, 0.063], [0.57, 0.112, 0.082],
  [0.63, 0.146, 0.107], [0.68, 0.152, 0.112], [0.73, 0.132, 0.097],
  [0.77, 0.112, 0.082], [0.82, 0.138, 0.101], [0.87, 0.148, 0.108],
  [0.91, 0.120, 0.088], [0.95, 0.082, 0.060], [0.98, 0.048, 0.035],
  [1.00, 0.018, 0.013],
];
const HEIGHT = 0.55, SLICES = 56, STACKS = 88;

function interpProfile(t) {
  for (let i = 0; i < PROFILE.length - 1; i++) {
    const [t0,rx0,rz0] = PROFILE[i], [t1,rx1,rz1] = PROFILE[i+1];
    if (t >= t0 && t <= t1) {
      const f = t1 > t0 ? (t-t0)/(t1-t0) : 0;
      return [rx0+f*(rx1-rx0), rz0+f*(rz1-rz0)];
    }
  }
  return [PROFILE.at(-1)[1], PROFILE.at(-1)[2]];
}

function buildGeometry() {
  const pos=[], nor=[], uv=[], idx=[];
  for (let i = 0; i <= STACKS; i++) {
    const t = i/STACKS;
    const y = (t-0.5)*HEIGHT;
    const [rx,rz] = interpProfile(t);
    const eps = 0.005;
    const [rxU,rzU] = interpProfile(Math.min(t+eps,1));
    const [rxD,rzD] = interpProfile(Math.max(t-eps,0));
    const drx=(rxU-rxD)/(2*eps*HEIGHT), drz=(rzU-rzD)/(2*eps*HEIGHT);
    for (let j = 0; j <= SLICES; j++) {
      const a = 2*Math.PI*j/SLICES, ca=Math.cos(a), sa=Math.sin(a);
      pos.push(rx*ca, y, rz*sa);
      const [tx1,ty1,tz1]=[-rx*sa,0,rz*ca], [tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2, ny=tz1*tx2-tx1*tz2, nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,ny/nl,nz/nl);
      uv.push(j/SLICES, t);
    }
  }
  for (let i=0;i<STACKS;i++) for (let j=0;j<SLICES;j++) {
    const a=i*(SLICES+1)+j, b=a+SLICES+1;
    idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',   new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',       new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.insertBefore(renderer.domElement, document.getElementById('msg'));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 20);
camera.position.set(0, 0.5, 1.5);
scene.add(new THREE.AmbientLight(0xffffff, 0.2));

// ── Iridescent soap-bubble shader ─────────────────────────────
const mat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.DoubleSide,
  depthWrite: false,
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
      vViewDir = normalize(-mvPos.xyz);
      gl_Position = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec3 vNormal;
    varying vec3 vViewDir;
    varying vec2 vUv;

    void main() {
      vec3 N = normalize(vNormal);
      vec3 V = normalize(vViewDir);
      float NdotV = abs(dot(N, V));
      float fresnel = pow(1.0 - NdotV, 1.4);

      // Soap-bubble iridescence: hue shifts with angle + position + time
      float phase = fresnel * 6.5 + vUv.y * 3.0 - uTime * 0.6;
      vec3 iri = vec3(
        0.5 + 0.5 * cos(phase),
        0.5 + 0.5 * cos(phase + 2.094),
        0.5 + 0.5 * cos(phase + 4.189)
      );

      // Pulse: breath-like oscillation
      float pulse = 0.5 + 0.5 * sin(uTime * 1.9);
      float innerGlow = 0.5 + 0.5 * sin(uTime * 0.7 + vUv.y * 4.0);

      // Combine: edge iridescence + inner glow
      vec3 col = iri * (0.15 + fresnel * 0.55)
               + iri * pulse * fresnel * 0.5
               + vec3(0.3, 0.6, 1.0) * innerGlow * (1.0 - NdotV) * 0.12;

      float alpha = 0.04 + fresnel * 0.6 + pulse * fresnel * 0.25;
      alpha = clamp(alpha, 0.0, 0.9);

      gl_FragColor = vec4(col, alpha);
    }
  `
});

// ── Mesh — lying flat (X-Z plane, Y up = thickness) ──────────
const mesh = new THREE.Mesh(buildGeometry(), mat);
// Rotate so the tall axis (Y) lies along Z → bubble is flat like the sculpture on the floor
mesh.rotation.x = -Math.PI / 2;
mesh.position.set(0, 0.004, -0.85); // just above surface, 85cm ahead
scene.add(mesh);

// ── AR session ────────────────────────────────────────────────
const btn = document.getElementById('ar-btn');

navigator.xr?.isSessionSupported('immersive-ar').then(ok => {
  if (!ok) { btn.textContent = 'AR indisponível'; btn.disabled = true; }
});

let xrSession = null;

btn.addEventListener('click', async () => {
  if (xrSession) return;
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['local-floor'],
      optionalFeatures: ['dom-overlay'],
      domOverlay: { root: document.body }
    });
    renderer.xr.setReferenceSpaceType('local-floor');
    await renderer.xr.setSession(xrSession);

    // Auto-place: flat on floor, 85cm in front, no tap needed
    mesh.rotation.x = 0; // flat on local-floor reference
    mesh.position.set(0, 0.004, -0.85);

    xrSession.addEventListener('end', () => {
      xrSession = null;
      document.getElementById('ui').style.display = 'flex';
      document.getElementById('msg').style.display = 'block';
    });

    document.getElementById('ui').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
  } catch(e) {
    alert('Erro: ' + e.message);
  }
});

// ── Loop ──────────────────────────────────────────────────────
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  mat.uniforms.uTime.value = clock.getElapsedTime();
  renderer.render(scene, camera);
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
