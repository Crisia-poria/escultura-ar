<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Escultura AR — Crisia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; font-family: sans-serif; }

    model-viewer {
      width: 100%;
      height: 100vh;
      background-color: transparent;
      --poster-color: transparent;
    }

    /* Overlay inicial */
    #poster {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 10;
      background: rgba(0,0,0,0.88); color: white;
      pointer-events: none; transition: opacity 0.6s;
    }
    #poster.hidden { opacity: 0; }
    #poster h1 { font-size: 22px; font-weight: 300; letter-spacing: 4px; margin-bottom: 10px; }
    #poster p  { font-size: 13px; color: rgba(255,255,255,0.6); text-align: center;
                  max-width: 260px; line-height: 1.8; }

    /* Botão AR (slot ar-button dentro do model-viewer) */
    #ar-button {
      padding: 14px 40px; border: 1px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.65); color: white; font-size: 13px;
      letter-spacing: 2px; cursor: pointer; border-radius: 2px;
      -webkit-tap-highlight-color: transparent;
      position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
    }
  </style>

  <!-- model-viewer — Google's official web component for 3D/AR -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

<model-viewer
  id="mv"
  src="./bubble.glb"
  ar
  ar-modes="webxr scene-viewer quick-look"
  ar-scale="fixed"
  ar-placement="floor"
  camera-controls
  auto-rotate
  loading="eager"
  reveal="auto"
  shadow-intensity="0"
  exposure="1.2"
  environment-image="neutral"
>
  <!-- Botão AR customizado -->
  <button id="ar-button" slot="ar-button">VER EM AR ✦</button>

  <!-- Fallback quando AR não disponível -->
  <div id="no-ar" slot="ar-failure" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:12px;letter-spacing:1px;">
    AR não disponível neste dispositivo
  </div>
</model-viewer>

<!-- Overlay inicial — fora do model-viewer -->
<div id="poster">
  <h1>ESCULTURA AR</h1>
  <p>Aponte para a escultura.<br>Toque em <strong>VER EM AR</strong> para ver a bolha no mundo real.</p>
</div>

<script>
const mv = document.getElementById('mv');
const poster = document.getElementById('poster');

function hidePoster() {
  poster.classList.add('hidden');
  setTimeout(() => { poster.style.display = 'none'; }, 600);
}

// Se já carregou antes do listener ser registrado
if (mv.loaded) { hidePoster(); }
else { mv.addEventListener('load', hidePoster); }

mv.addEventListener('error', (e) => {
  poster.querySelector('p').textContent = 'Erro ao carregar modelo: ' + (e.detail?.type || e);
});
</script>

</body>
</html>
