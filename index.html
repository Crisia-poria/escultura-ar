<!DOCTYPE html>

<head>

  <style>

    canvas{position:fixed;inset:0;width:100%!important;height:100%!important;}

    #exit{position:fixed;top:18px;right:18px;width:48px;height:48px;

        rgba(130,170,255,.12) 58%,rgba(210,160,255,.20) 100%);
      border:1.5px solid rgba(255,255,255,.45);
      box-shadow:inset -3px -3px 9px rgba(100,160,255,.28),

<body>
<button id="tap" aria-label="iniciar AR"></button>
<div id="st"></div>
<button id="exit" aria-label="sair">✕</button>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil domo liso ──────────────────────────────────────────
const PROFILE=[
  [0.00,0.680,0.620],[0.10,0.672,0.613],[0.22,0.646,0.589],
  [0.36,0.598,0.545],[0.50,0.528,0.481],[0.63,0.432,0.394],
  [0.74,0.314,0.286],[0.84,0.192,0.175],[0.92,0.092,0.083],
  [0.97,0.030,0.027],[1.00,0.006,0.005],
];
const SLICES=60,STACKS=80,MAX_RX=0.680,MAX_RZ=0.620;
const HEIGHT=0.82, HEIGHT2=4.82;

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo(h=HEIGHT){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS,[rx,rz]=interp(t);
    const e=0.004,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*h),drz=(rzU-rzD)/(2*e*h);
    for(let j=0;j<=SLICES;j++){
      const a=2*Math.PI*j/SLICES,ca=Math.cos(a),sa=Math.sin(a);
      pos.push(rx*ca,(t-.5)*h,rz*sa);
      const nx=rz*ca,ny=-rx*drz*sa*sa-rz*drx*ca*ca,nz=rx*sa;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,ny/nl,nz/nl);uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);

// ── GLSL compartilhado ────────────────────────────────────────
const VERT=`
  uniform float uTime,uTouch,uReveal,uWind;
  varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
  float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
  float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
    return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
  void main(){
    vUv=uv;
    float dt=uTime-uTouch,alive=step(dt,7.);
    float wf=dt*.30,dw=abs(uv.y-wf);
    float tw=exp(-dw*dw*7.)*alive*sin(dt*2.8-uv.y*6.)*max(0.,1.-dt*.08);
    float slimePull=exp(-dw*dw*3.)*alive*max(0.,1.-dt*.15)*0.06;
    float wind=sin(uTime*.7-uv.y*3.5+uWind)*.038*sin(uTime*.22+uv.x*2.);
    float br=sin(uTime*.42+uv.y*1.6)*.009+sin(uTime*.25+uv.x*2.1)*.006;
    float lq=(ns(uv*2.+vec2(uTime*.09,uTime*.06))-.5)*.012;
    float d=(tw*.10+slimePull+br+wind+lq)*uReveal;
    vDisp=d;vN=normalize(normalMatrix*normal);
    vec4 mv=modelViewMatrix*vec4(position+normal*d,1.);
    vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;
  }`;
const FRAG=`
  uniform float uTime,uTouch,uHue,uHueBase,uReveal,uWind;
  varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
  void main(){
    if(uReveal<=0.)discard;
    vec3 N=normalize(vN),V=normalize(vV);
    float NdotV=abs(dot(N,V));
    float rim=pow(1.-NdotV,1.8),core=pow(NdotV,3.5);
    float dt=uTime-uTouch,alive=step(dt,7.);
    float decay=max(0.,1.-dt*.14)*alive;
    float waveGlow=exp(-pow(vUv.y-dt*.30,2.)*14.)*decay;
    float ph=rim*7.+vUv.y*3.-uTime*.28+vDisp*38.+uHue+uHueBase+waveGlow*2.;
    vec3 iri=vec3(.5+.32*cos(ph),.5+.32*cos(ph+2.09),.5+.32*cos(ph+4.19));
    float metalBase=pow(1.-vUv.y,2.)*uReveal*1.6;
    float metalPulse=(.5+.5*sin(uTime*1.1-vUv.y*5.))*pow(1.-vUv.y,1.2)*1.3;
    float corona=exp(-vUv.y*5.5)*uReveal*0.7;
    float emanate=sin(vUv.y*6.28-uTime*1.4)*exp(-vUv.y*3.)*.5+.5;
    vec3 metalCol=vec3(.98,.70,.12)*(metalBase*.9+metalPulse*.6+corona*.5)
                 +vec3(.22,.52,.95)*emanate*pow(1.-vUv.y,1.8)*.4;
    float windVis=sin(uTime*.7-vUv.y*3.5+uWind)*(.5+.5*sin(uTime*.22))*rim*.3;
    float pulse=.5+.5*sin(uTime*1.3);
    vec3 col=iri*(rim*.70+pulse*rim*.2+decay*.4+windVis)+metalCol
            +iri*waveGlow*1.8+vec3(.02,.06,.12)*core*.2;
    float a=(rim*.68+core*.05+waveGlow*.38+pulse*rim*.15+metalBase*.20+metalPulse*.12+corona*.15)*uReveal;
    gl_FragColor=vec4(col,clamp(a,0.,.88));
  }`;
const HALO_FRAG=`uniform float uTime,uReveal;varying vec2 vU;
  void main(){float r=vU.x;float ph=r*5.-uTime*.4;
    vec3 c=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
    float a=(1.-r)*.28*(.5+.5*sin(uTime*1.2+r*6.))*uReveal;
    gl_FragColor=vec4(c,clamp(a,0.,.4));}`;
const GLOW_FRAG=`uniform float uTime,uReveal;varying vec2 vU;
  void main(){
    vec2 uv=vU*2.-1.;float r=length(uv);if(r>1.)discard;
    float glow=exp(-r*3.2)*(0.7+0.3*sin(uTime*1.9-r*5.5));
    vec3 col=mix(vec3(.98,.72,.10),vec3(.35,.65,1.),r*r);
    float a=glow*0.60*uReveal;
    gl_FragColor=vec4(col,clamp(a,0.,.72));}`;
const CAUS_FRAG=`uniform float uTime,uReveal;varying vec2 vU;
  void main(){
    vec2 uv=vU*2.-1.;float r=length(uv);if(r>1.)discard;
    float c1=sin(uv.x*9.+uTime*.8+sin(uv.y*7.+uTime*.55)*1.6);
    float c2=sin(uv.y*10.-uTime*1.1+sin(uv.x*8.-uTime*.45)*1.6);
    float caus=pow(max(0.,c1*c2),2.2)*1.4;
    float edge=1.-smoothstep(.65,1.,r);
    float ph=atan(uv.y,uv.x)+r*4.-uTime*.35;
    vec3 col=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
    float a=caus*edge*.32*uReveal;
    gl_FragColor=vec4(col*1.4+.3,clamp(a,0.,.55));}`;
const UV_VERT=`varying vec2 vU;void main(){vU=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

// ── Fábrica de domo ───────────────────────────────────────────
const GEO=buildGeo(HEIGHT);
const GEO2=buildGeo(HEIGHT2);
const PCOUNT=100;

function makeDome(geo=GEO,h=HEIGHT,hueBase=0){
  const mat=new THREE.ShaderMaterial({
    transparent:true,side:THREE.FrontSide,depthWrite:false,
    blending:THREE.CustomBlending,blendEquation:THREE.AddEquation,
    blendSrc:THREE.SrcAlphaFactor,blendDst:THREE.OneMinusSrcAlphaFactor,
    uniforms:{uTime:{value:0},uTouch:{value:-99},uHue:{value:0},uHueBase:{value:hueBase},uReveal:{value:0},uWind:{value:0}},
    vertexShader:VERT,fragmentShader:FRAG
  });
  const haloMat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    uniforms:{uTime:{value:0},uReveal:{value:0}},
    vertexShader:UV_VERT,fragmentShader:HALO_FRAG
  });
  const glowMat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    uniforms:{uTime:{value:0},uReveal:{value:0}},
    vertexShader:UV_VERT,fragmentShader:GLOW_FRAG
  });
  const causticMat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,side:THREE.DoubleSide,
    uniforms:{uTime:{value:0},uReveal:{value:0}},
    vertexShader:UV_VERT,fragmentShader:CAUS_FRAG
  });
  const partVert=`attribute float aLife;varying float vLife;
    void main(){vLife=aLife;vec4 mv=modelViewMatrix*vec4(position,1.);
      gl_PointSize=mix(9.,1.5,vLife*vLife);gl_Position=projectionMatrix*mv;}`;
  const partFrag=`uniform float uReveal,uTime;varying float vLife;
    void main(){vec2 pc=gl_PointCoord*2.-1.;if(length(pc)>1.)discard;
      float ph=vLife*12.566+uTime*.6;
      vec3 col=vec3(.5+.35*cos(ph),.5+.35*cos(ph+2.09),.5+.35*cos(ph+4.19));
      float a=(1.-length(pc))*(1.-vLife*vLife)*uReveal*.75;
      gl_FragColor=vec4(col,clamp(a,0.,.8));}`;
  const partMat=new THREE.ShaderMaterial({
    transparent:true,depthWrite:false,
    uniforms:{uReveal:{value:0},uTime:{value:0}},
    vertexShader:partVert,fragmentShader:partFrag
  });

  const mesh=new THREE.Mesh(geo,mat);
  const halo=new THREE.Mesh(new THREE.RingGeometry(.05,.70,72),haloMat);
  halo.rotation.x=-Math.PI/2;halo.position.y=.004;
  const groundGlow=new THREE.Mesh(new THREE.CircleGeometry(.68,60),glowMat);
  groundGlow.rotation.x=-Math.PI/2;groundGlow.position.y=.002;
  const caustic=new THREE.Mesh(new THREE.CircleGeometry(.68,60),causticMat);
  caustic.rotation.x=-Math.PI/2;caustic.position.y=.001;

  const pPosBuf=new Float32Array(PCOUNT*3),pLifeBuf=new Float32Array(PCOUNT);
  const pState=Array.from({length:PCOUNT},()=>({
    life:Math.random(),speed:0.18+Math.random()*0.28,
    angle:Math.random()*Math.PI*2,r:Math.random()*MAX_RX*.82
  }));
  const pGeo=new THREE.BufferGeometry();
  const pPosAttr=new THREE.BufferAttribute(pPosBuf,3);
  const pLifeAttr=new THREE.BufferAttribute(pLifeBuf,1);
  pGeo.setAttribute('position',pPosAttr);pGeo.setAttribute('aLife',pLifeAttr);
  const particles=new THREE.Points(pGeo,partMat);
  particles.visible=false;

  scene.add(mesh,halo,groundGlow,caustic,particles);

  return{mat,mesh,haloMat,halo,glowMat,groundGlow,causticMat,caustic,
         partMat,particles,pPosBuf,pLifeBuf,pPosAttr,pLifeAttr,pState,
         locked:false,hue:0,h};
}

// dome 0: âmbar/dourado (hueBase=0) · dome 1: azul/violeta (hueBase=2.1)
const domes=[makeDome(GEO,HEIGHT,0),makeDome(GEO2,HEIGHT2,2.1)];

// ── Texto interno: "em processo..." (domo 0) ──────────────────
const labelCanvas=document.createElement('canvas');
labelCanvas.width=512;labelCanvas.height=128;
(()=>{
  const ctx=labelCanvas.getContext('2d');
  ctx.clearRect(0,0,512,128);
  ctx.font='italic 52px Georgia, serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(160,210,255,0.9)';ctx.shadowBlur=18;
  ctx.fillStyle='rgba(220,240,255,0.92)';
  ctx.fillText('em processo…',256,64);
})();
const labelTex=new THREE.CanvasTexture(labelCanvas);
const labelMat=new THREE.MeshBasicMaterial({map:labelTex,transparent:true,depthWrite:false,side:THREE.DoubleSide,opacity:0});
const label=new THREE.Mesh(new THREE.PlaneGeometry(0.55,0.14),labelMat);
label.visible=false;scene.add(label);

// ── Sistema de árvores (ambos os domos) ───────────────────────
function buildTreeSegs(trunkLen,maxDepth,seed){
  const segs=[];let ord=0;
  function branch(start,dir,len,depth){
    if(depth<0||len<0.03)return;
    const end=start.clone().addScaledVector(dir,len);
    segs.push({ox:start.x,oy:start.y,oz:start.z,
               ex:end.x,ey:end.y,ez:end.z,depth,order:ord++});
    if(depth===0)return;
    const count=depth>=maxDepth-1?3:2;
    for(let i=0;i<count;i++){
      const angleY=(i/count)*Math.PI*2+(depth*1.3+seed);
      const tilt=0.35+((seed*7+i*3+depth)%10)*0.025;
      const perp=new THREE.Vector3(Math.sin(angleY),0,Math.cos(angleY));
      const newDir=dir.clone().multiplyScalar(Math.cos(tilt))
                      .addScaledVector(perp,Math.sin(tilt)).normalize();
      branch(end,newDir,len*0.65,depth-1);
    }
  }
  branch(new THREE.Vector3(0,0,0),new THREE.Vector3(0,1,0),trunkLen,maxDepth);
  return segs;
}

function makeForest(trunkLen,maxDepth,radius,baseHue,shrubCount){
  const groups=[];
  // árvore principal no centro
  const mainSegs=buildTreeSegs(trunkLen,maxDepth,0);
  // 5 arbustos em anel
  const allGroups=[{segs:mainSegs,ox:0,oz:0,scale:1}];
  for(let i=0;i<shrubCount;i++){
    const a=(i/shrubCount)*Math.PI*2;
    const r=radius*(0.45+i%2*0.15);
    allGroups.push({
      segs:buildTreeSegs(trunkLen*0.32,Math.max(2,maxDepth-2),i+1),
      ox:Math.cos(a)*r, oz:Math.sin(a)*r, scale:0.32
    });
  }
  const lines=[],mats=[];
  allGroups.forEach(({segs,ox,oz})=>{
    segs.forEach(s=>{
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(
        [s.ox+ox,s.oy,s.oz+oz, s.ex+ox,s.ey,s.ez+oz],3));
      const hsl=baseHue+s.depth*0.03;
      const m=new THREE.LineBasicMaterial({
        color:new THREE.Color().setHSL(hsl,0.72,0.35+s.depth*0.07),
        transparent:true,opacity:0});
      const l=new THREE.Line(g,m);
      l.visible=false;scene.add(l);
      lines.push({line:l,mat:m,seg:s,totalSegs:segs.length});
      mats.push(m);
    });
  });
  return{lines,mats};
}

// dome 0: árvore pequena, verde-quente; dome 1: árvore grande, verde-azulado
const forest0=makeForest(HEIGHT*0.28,4,MAX_RX*0.55,0.28,5);
const forest1=makeForest(HEIGHT2*0.30,5,MAX_RX*0.58,0.40,5);
const forests=[forest0,forest1];
const forestRevealTimes=[null,null];

// ── Pool de luz ───────────────────────────────────────────────
const poolMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{uTime:{value:0},uFill:{value:0}},
  vertexShader:UV_VERT,
  fragmentShader:`
    uniform float uTime,uFill;varying vec2 vU;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      if(uFill<=0.)discard;
      vec2 uv=vU*2.-1.;float r=length(uv);if(r>1.)discard;
      float edge=1.-r;
      float ripple=sin(r*12.-uTime*2.8)*.5+.5;
      float spiral=sin(atan(uv.y,uv.x)*5.+uTime*1.2-r*8.)*.5+.5;
      float noise=ns(uv*3.+uTime*.3);
      float ph=r*4.-uTime*.5+spiral*2.;
      vec3 col=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
      float waveGlow=exp(-pow(r-uFill*1.3,2.)*18.)*uFill;
      float a=(edge*edge*(ripple*.4+spiral*.3+noise*.3)*.18+waveGlow*.6)*uFill;
      gl_FragColor=vec4(col+waveGlow*.4,clamp(a,0.,.7));}`
});
const pool=new THREE.Mesh(new THREE.CircleGeometry(.7,72),poolMat);
pool.rotation.x=-Math.PI/2;pool.visible=false;scene.add(pool);

// ── Burst ─────────────────────────────────────────────────────
const BCOUNT=28;
const bPosBuf=new Float32Array(BCOUNT*3),bLifeBuf=new Float32Array(BCOUNT);
const bVel=Array.from({length:BCOUNT},()=>({x:0,y:0,z:0}));
let burstActive=false;
const bGeo=new THREE.BufferGeometry();
const bPosAttr=new THREE.BufferAttribute(bPosBuf,3);
const bLifeAttr=new THREE.BufferAttribute(bLifeBuf,1);
bGeo.setAttribute('position',bPosAttr);bGeo.setAttribute('aLife',bLifeAttr);
const burstMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,uniforms:{uTime:{value:0}},
  vertexShader:`attribute float aLife;varying float vLife;
    void main(){vLife=aLife;vec4 mv=modelViewMatrix*vec4(position,1.);
      gl_PointSize=mix(14.,1.5,vLife*vLife);gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`uniform float uTime;varying float vLife;
    void main(){vec2 pc=gl_PointCoord*2.-1.;if(length(pc)>1.)discard;
      float ph=vLife*10.+uTime*.9;
      vec3 col=vec3(.5+.4*cos(ph),.5+.4*cos(ph+2.09),.5+.4*cos(ph+4.19));
      float a=(1.-length(pc))*max(0.,1.-vLife*1.4);
      gl_FragColor=vec4(col,clamp(a,0.,.92));}`
});
const burstPoints=new THREE.Points(bGeo,burstMat);
burstPoints.visible=false;scene.add(burstPoints);

function triggerBurst(p){
  for(let i=0;i<BCOUNT;i++){
    bPosBuf[i*3]=p.x;bPosBuf[i*3+1]=p.y;bPosBuf[i*3+2]=p.z;bLifeBuf[i]=0;
    const th=Math.random()*Math.PI*2,ph2=Math.random()*Math.PI*.8,sp=0.4+Math.random()*0.7;
    bVel[i]={x:Math.sin(ph2)*Math.cos(th)*sp,y:Math.cos(ph2)*sp*.6+0.15,z:Math.sin(ph2)*Math.sin(th)*sp};
  }
  bPosAttr.needsUpdate=true;bLifeAttr.needsUpdate=true;
  burstActive=true;burstPoints.visible=true;
}
function updateBurst(dt,t){
  if(!burstActive)return;
  burstMat.uniforms.uTime.value=t;
  let alive=false;
  for(let i=0;i<BCOUNT;i++){
    bLifeBuf[i]+=dt*0.38;
    if(bLifeBuf[i]<1){alive=true;
      bPosBuf[i*3]+=bVel[i].x*dt;bPosBuf[i*3+1]+=bVel[i].y*dt;bPosBuf[i*3+2]+=bVel[i].z*dt;
      bVel[i].y-=2.2*dt;}
  }
  bPosAttr.needsUpdate=true;bLifeAttr.needsUpdate=true;
  if(!alive){burstActive=false;burstPoints.visible=false;}
}

// ── Mãos ──────────────────────────────────────────────────────
const JNAMES=['wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];
const TIP_NAMES=new Set(['index-finger-tip','middle-finger-tip','thumb-tip','ring-finger-tip','pinky-finger-tip']);
const handMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:.32});
const jointGeo=new THREE.SphereGeometry(.007,6,6);
function makeJoints(){return JNAMES.map(()=>{const s=new THREE.Mesh(jointGeo,handMat);s.visible=false;scene.add(s);return s;});}
const handJointsL=makeJoints(),handJointsR=makeJoints();
const prevD={left:[2,2],right:[2,2]};

function ellD(p,dome){
  if(!dome.locked)return 2;
  const lx=(p.x-dome.mesh.position.x)/MAX_RX;
  const ly=(p.y-dome.mesh.position.y)/(dome.h/2);
  const lz=(p.z-dome.mesh.position.z)/MAX_RZ;
  return Math.sqrt(lx*lx+ly*ly+lz*lz);
}

function updateHands(frame,joints,hand,ref,side,t){
  JNAMES.forEach((name,i)=>{
    const jt=hand.get(name);
    if(!jt){joints[i].visible=false;return;}
    const pose=frame.getJointPose(jt,ref);
    if(!pose){joints[i].visible=false;return;}
    const p=pose.transform.position;
    joints[i].position.set(p.x,p.y,p.z);joints[i].visible=true;
    if(TIP_NAMES.has(name)){
      domes.forEach((dome,di)=>{
        const d=ellD(p,dome);
        if(prevD[side][di]>1.05&&d<=1.0){
          playMetalWobble(.9);
          dome.mat.uniforms.uTouch.value=t;
          dome.hue+=Math.PI*.72;dome.mat.uniforms.uHue.value=dome.hue;
          triggerBurst(p);
        }
        prevD[side][di]=d<prevD[side][di]?d:Math.min(2,prevD[side][di]+.03);
      });
    }
  });
}

// ── Som ───────────────────────────────────────────────────────
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
}
function playMetalWobble(vol=1.0){
  ensureAudio();const ac=audioCtx,now=ac.currentTime;
  // reverb com tempo e feedback variáveis
  const rv=0.08+Math.random()*0.16, fb=0.30+Math.random()*0.22;
  const rev1=ac.createDelay(3);rev1.delayTime.value=rv;
  const rev2=ac.createDelay(3);rev2.delayTime.value=rv*1.6+0.04;
  const fb1=ac.createGain();fb1.gain.value=fb;
  const fb2=ac.createGain();fb2.gain.value=fb*0.8;
  const wet=ac.createGain();wet.gain.value=0.44+Math.random()*0.22;
  rev1.connect(fb1);fb1.connect(rev1);rev1.connect(wet);
  rev2.connect(fb2);fb2.connect(rev2);rev2.connect(wet);
  wet.connect(ac.destination);
  // conjunto de modos aleatório a cada toque (3 variantes)
  const sets=[
    [[28,1.00,8.5],[42,0.78,7.2],[63,0.52,6.0],[95,0.28,5.0],[148,0.12,4.2]],
    [[38,1.00,7.0],[55,0.72,6.2],[81,0.45,5.4],[112,0.22,4.5],[167,0.10,3.8]],
    [[52,1.00,6.5],[73,0.68,5.8],[108,0.40,5.0],[158,0.18,4.0],[223,0.08,3.2]],
  ];
  const chosen=sets[Math.floor(Math.random()*sets.length)];
  chosen.forEach(([f,g,dur])=>{
    const detune=1.001+Math.random()*0.006;
    const o1=ac.createOscillator(),o2=ac.createOscillator();
    const lfo=ac.createOscillator(),lfoG=ac.createGain();
    lfo.frequency.value=0.12+Math.random()*0.9;
    lfoG.gain.value=f*(0.010+Math.random()*0.018);
    lfo.connect(lfoG);lfoG.connect(o1.frequency);lfoG.connect(o2.frequency);
    lfo.start(now);lfo.stop(now+dur+1);
    o1.type='sine';o2.type='sine';
    o1.frequency.value=f;o2.frequency.value=f*detune;
    const attack=0.06+Math.random()*0.18;
    const gn=ac.createGain();
    gn.gain.setValueAtTime(0,now);
    gn.gain.linearRampToValueAtTime(vol*g*0.18,now+attack);
    gn.gain.setTargetAtTime(vol*g*0.10,now+attack+0.3,dur*0.22+Math.random()*dur*0.12);
    gn.gain.setTargetAtTime(0,now+dur*0.40+Math.random()*dur*0.15,dur*0.38+Math.random()*0.5);
    o1.connect(gn);o2.connect(gn);
    gn.connect(ac.destination);gn.connect(rev1);gn.connect(rev2);
    o1.start(now);o1.stop(now+dur+2);o2.start(now);o2.stop(now+dur+2);
  });
}

// ── Estado ────────────────────────────────────────────────────
const LOCK_TIME=30; // segundos de foco por escultura
let xrSess=null,xrRef=null,xrViewerSpace=null,hitSrc=null;
let lockedCount=0,scanning=false,scanAccum=0;
let windPhase=0;
const clock=new THREE.Clock();
let lastT=0;

const tapEl=document.getElementById('tap');
const stEl=document.getElementById('st');
const exitEl=document.getElementById('exit');
function status(m){stEl.textContent=m;stEl.style.display=m?'block':'none';}
exitEl.addEventListener('click',()=>{if(xrSess)xrSess.end();});

function placeDome(dome,px,pz){
  dome.mesh.position.set(px,dome.h/2,pz);
  dome.halo.position.set(px,.004,pz);
  dome.particles.position.set(px,dome.h/2,pz);
  dome.groundGlow.position.set(px,.002,pz);
  dome.caustic.position.set(px,.001,pz);
}

function lockDome(idx,px,pz){
  const dome=domes[idx];
  placeDome(dome,px,pz);
  dome.locked=true;
  pool.visible=false;
  poolMat.uniforms.uFill.value=0;
  scanAccum=0;
  lockedCount++;
  if(idx===0){
    label.position.set(px,HEIGHT*0.35,pz);
    label.visible=true;
  }
  // posiciona e activa floresta do domo idx
  const f=forests[idx];
  f.lines.forEach(({line,seg})=>{
    const pos=line.geometry.attributes.position;
    const arr=pos.array;
    arr[0]+=px;arr[2]+=pz;arr[3]+=px;arr[5]+=pz;
    pos.needsUpdate=true;
    line.visible=true;
  });
  forestRevealTimes[idx]=clock.getElapsedTime();
  if(lockedCount<2){
    scanning=true;
    status('Agora olhe para a segunda escultura e aguarde 30s…');
  } else {
    scanning=false;
    status('Toque as bolhas');
  }
}

function updateParticles(dome,dt,t){
  if(!dome.locked){dome.particles.visible=false;return;}
  dome.particles.visible=true;
  dome.partMat.uniforms.uTime.value=t;
  dome.partMat.uniforms.uReveal.value=dome.mat.uniforms.uReveal.value;
  dome.pState.forEach((p,i)=>{
    p.life+=dt*p.speed;
    if(p.life>=1){p.life=0;p.angle=Math.random()*Math.PI*2;p.r=Math.random()*MAX_RX*.82;}
    const r=p.r*(1-p.life*.85),ang=p.angle+p.life*Math.PI*2;
    dome.pPosBuf[i*3]=r*Math.cos(ang);
    dome.pPosBuf[i*3+1]=(p.life-.5)*HEIGHT;
    dome.pPosBuf[i*3+2]=r*Math.sin(ang);
    dome.pLifeBuf[i]=p.life;
  });
  dome.pPosAttr.needsUpdate=true;dome.pLifeAttr.needsUpdate=true;
}

function resetAll(){
  lockedCount=0;scanning=false;scanAccum=0;
  domes.forEach(d=>{
    d.locked=false;d.hue=0;
    d.mat.uniforms.uReveal.value=0;d.mat.uniforms.uTouch.value=-99;d.mat.uniforms.uHue.value=0;
    d.haloMat.uniforms.uReveal.value=0;d.glowMat.uniforms.uReveal.value=0;
    d.causticMat.uniforms.uReveal.value=0;d.partMat.uniforms.uReveal.value=0;
    d.particles.visible=false;
  });
  pool.visible=false;poolMat.uniforms.uFill.value=0;
  label.visible=false;labelMat.opacity=0;
  forests.forEach((f,i)=>{
    f.lines.forEach(({line,mat})=>{line.visible=false;mat.opacity=0;});
    forestRevealTimes[i]=null;
  });
  prevD.left=[2,2];prevD.right=[2,2];
}

function setupSession(session){
  xrSess=session;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.xr.setSession(session)
    .then(()=>session.requestReferenceSpace('local-floor'))
    .then(ref=>{
      xrRef=ref;
      resetAll();scanning=true;
      lastT=clock.getElapsedTime();
      tapEl.classList.add('hidden');
      renderer.domElement.style.display='block';
      exitEl.style.display='flex';
      status('Olhe para a primeira escultura e aguarde 30s…');
      return session.requestReferenceSpace('viewer')
        .then(vs=>{xrViewerSpace=vs;return session.requestHitTestSource({space:vs});})
        .catch(()=>null);
    })
    .then(hs=>{hitSrc=hs;})
    .catch(e=>status('Erro: '+e.message));

  session.addEventListener('end',()=>{
    xrSess=null;xrRef=null;xrViewerSpace=null;hitSrc=null;
    resetAll();
    [...handJointsL,...handJointsR].forEach(j=>{j.visible=false;});
    renderer.domElement.style.display='none';
    tapEl.classList.remove('hidden');
    exitEl.style.display='none';
    status('');
  });
}

tapEl.addEventListener('click',()=>{
  if(xrSess)return;
  if(!navigator.xr){alert('WebXR não disponível neste browser.');return;}
  ensureAudio();
  navigator.xr.requestSession('immersive-ar',{
    requiredFeatures:['local-floor'],
    optionalFeatures:['hit-test','hand-tracking','dom-overlay'],
    domOverlay:{root:document.body}
  }).then(setupSession).catch(e=>alert('Erro AR: '+(e.message||e)));
});

// ── Loop ──────────────────────────────────────────────────────
renderer.setAnimationLoop((ts,frame)=>{
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,.05);lastT=t;
  windPhase+=dt*0.14;

  domes.forEach(d=>{
    d.mat.uniforms.uTime.value=t;d.mat.uniforms.uWind.value=windPhase;
    d.haloMat.uniforms.uTime.value=t;d.glowMat.uniforms.uTime.value=t;
    d.causticMat.uniforms.uTime.value=t;
  });
  poolMat.uniforms.uTime.value=t;

  if(!frame||!xrRef){renderer.render(scene,camera);return;}

  // Revela domos bloqueados
  domes.forEach(d=>{
    if(!d.locked)return;
    const rev=Math.min(1,d.mat.uniforms.uReveal.value+dt*.4);
    d.mat.uniforms.uReveal.value=rev;
    d.haloMat.uniforms.uReveal.value=rev;
    d.glowMat.uniforms.uReveal.value=rev;
    d.causticMat.uniforms.uReveal.value=rev;
  });

  // Hit-test: cursor para próximo domo
  if(scanning&&hitSrc){
    pool.visible=true;
    const hits=frame.getHitTestResults(hitSrc);
    if(hits.length>0){
      const p=hits[0].getPose(xrRef);
      if(p){
        const hx=p.transform.position.x,hz=p.transform.position.z;
        pool.position.set(hx,.003,hz);
        scanAccum+=dt;
        const fill=Math.min(1,scanAccum/LOCK_TIME);
        poolMat.uniforms.uFill.value=fill;
        pool.scale.setScalar(1+.04*Math.sin(t*4));
        if(scanAccum>=LOCK_TIME)lockDome(lockedCount,hx,hz);
      }
    } else {
      scanAccum=Math.max(0,scanAccum-dt*2);
      poolMat.uniforms.uFill.value=Math.min(1,scanAccum/LOCK_TIME);
    }
  }

  // Texto "em processo..." — fade in + leve flutuação
  if(label.visible){
    labelMat.opacity=Math.min(1,labelMat.opacity+dt*0.4);
    label.position.y=HEIGHT*0.35+Math.sin(t*0.7)*0.015;
    label.rotation.y=Math.sin(t*0.22)*0.08;
  }

  // Florestas crescendo — revela ramos lentamente
  forests.forEach((f,fi)=>{
    const rt=forestRevealTimes[fi];
    if(rt===null)return;
    const elapsed=t-rt;
    const totalDur=28;
    f.lines.forEach(({mat,seg,totalSegs})=>{
      const revAt=(seg.order/totalSegs)*totalDur;
      const fadeIn=Math.min(1,Math.max(0,(elapsed-revAt)*0.8));
      mat.opacity=fadeIn*(0.75-seg.depth*0.05);
    });
  });

  // Partículas por domo
  domes.forEach(d=>updateParticles(d,dt,t));
  updateBurst(dt,t);

  // Mãos
  const sess=renderer.xr.getSession();
  if(sess){
    for(const src of sess.inputSources){
      if(src.hand){
        const side=src.handedness==='left'?'left':'right';
        const joints=side==='left'?handJointsL:handJointsR;
        updateHands(frame,joints,src.hand,xrRef,side,t);
      }
    }
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
