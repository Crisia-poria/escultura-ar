<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Metal e Bolha</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;}
    #ar-container{position:fixed;inset:0;}
    #tap{position:fixed;inset:0;z-index:10;display:flex;align-items:center;justify-content:center;
      cursor:pointer;background:transparent;border:none;outline:none;}
    #tap::after{content:'';width:44px;height:44px;border:1px solid rgba(255,255,255,.2);
      border-radius:50%;animation:br 3s ease-in-out infinite;}
    @keyframes br{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:.5;transform:scale(1.12);}}
    #tap.hidden{display:none;}
    #err{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);z-index:20;
      color:rgba(255,255,255,.6);font:13px/1.5 sans-serif;display:none;text-align:center;
      background:rgba(0,0,0,.5);padding:8px 14px;border-radius:8px;}
  </style>
</head>
<body>
<div id="ar-container"></div>
<button id="tap" aria-label="iniciar"></button>
<div id="err"></div>

<!-- Three.js e MindAR como scripts globais (não módulos) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"></script>

<script>
// ── Perfil: meio-domo de bolha de sabão ───────────────────────
const PROFILE=[
  [0.00,0.010,0.008],
  [0.04,0.165,0.155],
  [0.10,0.330,0.315],
  [0.19,0.445,0.430],
  [0.29,0.490,0.475],
  [0.40,0.510,0.495],
  [0.50,0.515,0.500],
  [0.60,0.510,0.495],
  [0.71,0.488,0.472],
  [0.81,0.432,0.416],
  [0.90,0.318,0.302],
  [0.96,0.155,0.140],
  [1.00,0.010,0.008],
];
const HEIGHT=1.55,SLICES=80,STACKS=120;
const MAX_RX=0.515,MAX_RZ=0.500;

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

// Apenas metade superior (ângulo 0→π)
function buildGeo(){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS,[rx,rz]=interp(t);
    const e=0.004,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT),drz=(rzU-rzD)/(2*e*HEIGHT);
    for(let j=0;j<=SLICES;j++){
      const a=Math.PI*j/SLICES,ca=Math.cos(a),sa=Math.sin(a);
      const bx=Math.sin(a*.9+t*4.1)*.030+Math.sin(a*1.8-t*2.7)*.018;
      const bz=Math.sin(a*1.1+t*3.4)*.026+Math.sin(a*.7-t*5.0)*.015;
      pos.push((rx+bx)*ca,(rz+bz)*sa,-(t-.5)*HEIGHT);
      const[tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2,ny=tz1*tx2-tx1*tz2,nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,nz/nl,-ny/nl);uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);return g;
}

// ── Shader ────────────────────────────────────────────────────
const mat=new THREE.ShaderMaterial({
  transparent:true,side:THREE.DoubleSide,depthWrite:false,
  blending:THREE.CustomBlending,blendEquation:THREE.AddEquation,
  blendSrc:THREE.SrcAlphaFactor,blendDst:THREE.OneMinusSrcAlphaFactor,
  uniforms:{
    uTime:{value:0},uTouch:{value:-99},uHue:{value:0},
    uReveal:{value:0},uHand:{value:-1},uWind:{value:0}
  },
  vertexShader:`
    uniform float uTime,uTouch,uReveal,uWind;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vUv=uv;
      float dt=uTime-uTouch,alive=step(dt,7.);
      float wf=dt*.30,dw=abs(uv.y-wf);
      float tw=exp(-dw*dw*15.)*alive*sin(dt*2.5-uv.y*5.)*max(0.,1.-dt*.13);
      float wind=sin(uTime*.7-uv.y*3.5+uWind)*.038*sin(uTime*.22+uv.x*2.);
      float br=sin(uTime*.42+uv.y*1.6)*.009+sin(uTime*.25+uv.x*2.1)*.006;
      float lq=(ns(uv*2.+vec2(uTime*.09,uTime*.06))-.5)*.012;
      float d=(tw*.022+br+wind+lq)*uReveal;
      vDisp=d;
      vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(position+normal*d,1.);
      vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHue,uReveal,uWind;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp;
    void main(){
      if(uReveal<=0.)discard;
      vec3 N=normalize(vN),V=normalize(vV);
      float NdotV=abs(dot(N,V));
      float rim=pow(1.-NdotV,1.8);
      float core=pow(NdotV,3.5);
      float dt=uTime-uTouch,alive=step(dt,7.);
      float decay=max(0.,1.-dt*.14)*alive;
      float wf=dt*.30;
      float waveGlow=exp(-pow(vUv.y-wf,2.)*14.)*decay;
      float ph=rim*7.+vUv.y*3.-uTime*.28+vDisp*38.+uHue+waveGlow*2.;
      vec3 iri=vec3(.5+.32*cos(ph),.5+.32*cos(ph+2.09),.5+.32*cos(ph+4.19));
      // Aura do metal: base quente (contato com escultura)
      float metalBase=pow(1.-vUv.y,3.)*uReveal;
      float metalPulse=(.5+.5*sin(uTime*1.1-vUv.y*5.))*pow(1.-vUv.y,1.5);
      float emanate=sin(vUv.y*6.28-uTime*1.4)*exp(-vUv.y*3.)*.5+.5;
      vec3 metalCol=vec3(.95,.65,.10)*(metalBase*.8+metalPulse*.5)
                   +vec3(.20,.50,.90)*emanate*pow(1.-vUv.y,2.)*.35;
      float windVis=sin(uTime*.7-vUv.y*3.5+uWind)*(.5+.5*sin(uTime*.22))*rim*.3;
      float pulse=.5+.5*sin(uTime*1.3);
      vec3 waveCol=iri*waveGlow*1.8;
      vec3 col=iri*(rim*.70+pulse*rim*.2+decay*.4+windVis)+metalCol+waveCol
              +vec3(.02,.06,.12)*core*.2;
      float a=(rim*.68+core*.05+waveGlow*.38+pulse*rim*.15+metalBase*.18+metalPulse*.10)*uReveal;
      gl_FragColor=vec4(col,clamp(a,0.,.85));
    }`
});

// ── Halo no chão ─────────────────────────────────────────────
const haloMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{uTime:{value:0},uReveal:{value:0}},
  vertexShader:`varying vec2 vUv2;void main(){vUv2=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float uTime,uReveal;varying vec2 vUv2;
    void main(){
      float r=vUv2.x;
      float ph=r*5.-uTime*.4;
      vec3 c=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
      float pulse=.5+.5*sin(uTime*1.2+r*6.);
      float a=(1.-r)*.28*pulse*uReveal;
      gl_FragColor=vec4(c,clamp(a,0.,.4));
    }`
});
const halo=new THREE.Mesh(new THREE.RingGeometry(.05,1.2,80),haloMat);
// Sem rotação extra — no espaço do anchor o plano da imagem já é horizontal

// ── Mesh ──────────────────────────────────────────────────────
const mesh=new THREE.Mesh(buildGeo(),mat);
// Rotação para alinhar o domo apontando para cima no espaço do anchor
// No anchor do MindAR: XY = plano da imagem, Z = normal (para cima)
// Nossa geometria: domo abre em +Y — após Rx(π/2) o +Y vira +Z (para cima) ✓
mesh.rotation.x=Math.PI/2;
// Escala: 1 unidade MindAR = largura da imagem alvo
// A bolha deve cobrir a escultura e ir além — escala generosa
mesh.scale.set(3.0,3.0,3.0);
halo.scale.set(2.5,2.5,2.5);

// ── Som: metal wobble ─────────────────────────────────────────
let audioCtx=null;
let hue=0;
const clock=new THREE.Clock();

function playMetalWobble(vol=1.0){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended') audioCtx.resume();
  const ac=audioCtx,now=ac.currentTime,dur=4.0;
  const lfo=ac.createOscillator(),lfoG=ac.createGain();
  lfo.frequency.value=3.8;lfoG.gain.value=22;
  lfo.connect(lfoG);lfo.start(now);lfo.stop(now+dur);
  [[72,1.0],[144,.55],[216,.32],[340,.18],[560,.08]].forEach(([f,g])=>{
    const osc=ac.createOscillator(),gain=ac.createGain();
    osc.type='sawtooth';osc.frequency.value=f;
    lfoG.connect(osc.frequency);
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(vol*g*.35,now+.05);
    gain.gain.exponentialRampToValueAtTime(.0001,now+dur);
    osc.connect(gain);gain.connect(ac.destination);
    osc.start(now);osc.stop(now+dur);
  });
}

// ── Iniciar ───────────────────────────────────────────────────
const tapEl=document.getElementById('tap');
const errEl=document.getElementById('err');

// Verifica se MindAR carregou
window.addEventListener('load',()=>{
  if(!window.MINDAR||!window.MINDAR.IMAGE){
    errEl.textContent='MindAR não carregou. Verifique conexão.';
    errEl.style.display='block';
  }
});

tapEl.addEventListener('click',async()=>{
  errEl.style.display='none';

  // Verifica disponibilidade
  if(!window.MINDAR||!window.MINDAR.IMAGE){
    errEl.textContent='MindAR não disponível. Recarregue a página.';
    errEl.style.display='block';return;
  }

  tapEl.classList.add('hidden');
  errEl.textContent='Iniciando câmera…';errEl.style.display='block';

  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();

  const MindARThree=window.MINDAR.IMAGE.MindARThree;
  let mindarThree;
  try{
    mindarThree=new MindARThree({
      container:document.getElementById('ar-container'),
      imageTargetSrc:'targets.mind',
      maxTrack:1,
      uiLoading:'yes',
      uiScanning:'yes',
    });
  }catch(e){
    errEl.textContent='Erro MindAR: '+(e.message||e);errEl.style.display='block';
    tapEl.classList.remove('hidden');return;
  }

  const{renderer,scene,camera}=mindarThree;

  // Adiciona malha e halo ao anchor da escultura (índice 0)
  const anchor=mindarThree.addAnchor(0);
  anchor.group.add(mesh);
  anchor.group.add(halo);

  // Fade-in quando detecta
  anchor.onTargetFound=()=>{
    mat.uniforms.uReveal.value=0;
    haloMat.uniforms.uReveal.value=0;
  };

  // Toque na tela = interação com a bolha
  renderer.domElement.addEventListener('click',()=>{
    if(!anchor.group.visible)return;
    playMetalWobble(.9);
    mat.uniforms.uTouch.value=clock.getElapsedTime();
    hue+=Math.PI*.72;mat.uniforms.uHue.value=hue;
  });

  try{
    await mindarThree.start();
  }catch(e){
    errEl.textContent='Câmera: '+(e.message||e);errEl.style.display='block';
    tapEl.classList.remove('hidden');return;
  }

  renderer.setAnimationLoop(()=>{
    const t=clock.getElapsedTime();
    mat.uniforms.uTime.value=t;
    mat.uniforms.uWind.value=t;
    haloMat.uniforms.uTime.value=t;

    if(anchor.group.visible){
      const rev=Math.min(1,mat.uniforms.uReveal.value+.016);
      mat.uniforms.uReveal.value=rev;
      haloMat.uniforms.uReveal.value=rev;
    } else {
      const rev=Math.max(0,mat.uniforms.uReveal.value-.016);
      mat.uniforms.uReveal.value=rev;
      haloMat.uniforms.uReveal.value=rev;
    }

    renderer.render(scene,camera);
  });
});
</script>
</body>
</html>
