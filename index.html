<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Metal e Bolha</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;}
    canvas{position:fixed;inset:0;width:100%!important;height:100%!important;}
    #tap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      cursor:pointer;background:transparent;border:none;outline:none;}
    #tap::after{content:'';width:44px;height:44px;border:1px solid rgba(255,255,255,.2);
      border-radius:50%;animation:br 3s ease-in-out infinite;}
    @keyframes br{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:.5;transform:scale(1.12);}}
    #tap.hidden{display:none;}
    #err{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      color:rgba(255,255,255,.35);font:11px/1.5 sans-serif;letter-spacing:1px;display:none;text-align:center;}
  </style>
</head>
<body>
<button id="tap" aria-label="iniciar AR"></button>
<div id="err"></div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.150.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// ── Perfil: bolha de sabão — tamanho médio ────────────────────
const PROFILE=[
  [0.00,0.010,0.008],
  [0.04,0.165,0.155],
  [0.10,0.330,0.315],
  [0.19,0.445,0.430],
  [0.29,0.490,0.475],
  [0.40,0.510,0.495],
  [0.50,0.515,0.500],  // centro
  [0.60,0.510,0.495],
  [0.71,0.488,0.472],
  [0.81,0.432,0.416],
  [0.90,0.318,0.302],
  [0.96,0.155,0.140],
  [1.00,0.010,0.008],
];
const HEIGHT=1.55,SLICES=80,STACKS=120;
const MAX_RX=0.515,MAX_RZ=0.500;

function interp(t){
  for(let i=0;i<PROFILE.length-1;i++){
    const[t0,a,b]=PROFILE[i],[t1,c,d]=PROFILE[i+1];
    if(t>=t0&&t<=t1){const f=(t1>t0)?(t-t0)/(t1-t0):0;return[a+f*(c-a),b+f*(d-b)];}
  }
  return PROFILE.at(-1).slice(1);
}

function buildGeo(){
  const pos=[],nor=[],uv=[],idx=[];
  for(let i=0;i<=STACKS;i++){
    const t=i/STACKS,[rx,rz]=interp(t);
    const e=0.004,[rxU,rzU]=interp(Math.min(t+e,1)),[rxD,rzD]=interp(Math.max(t-e,0));
    const drx=(rxU-rxD)/(2*e*HEIGHT),drz=(rzU-rzD)/(2*e*HEIGHT);
    for(let j=0;j<=SLICES;j++){
      const a=2*Math.PI*j/SLICES,ca=Math.cos(a),sa=Math.sin(a);
      const bx=Math.sin(a*.9+t*4.1)*.032+Math.sin(a*1.8-t*2.7)*.018+Math.sin(a*3.2+t*1.4)*.008;
      const bz=Math.sin(a*1.1+t*3.4)*.028+Math.sin(a*.7-t*5.0)*.015+Math.sin(a*2.6+t*1.9)*.007;
      pos.push((rx+bx)*ca,(rz+bz)*sa,-(t-.5)*HEIGHT);
      const[tx1,ty1,tz1]=[-rx*sa,0,rz*ca],[tx2,ty2,tz2]=[drx*ca,1,drz*sa];
      let nx=ty1*tz2-tz1*ty2,ny=tz1*tx2-tx1*tz2,nz=tx1*ty2-ty1*tx2;
      const nl=Math.sqrt(nx*nx+ny*ny+nz*nz)||1;
      nor.push(nx/nl,nz/nl,-ny/nl);uv.push(j/SLICES,t);
    }
  }
  for(let i=0;i<STACKS;i++)for(let j=0;j<SLICES;j++){
    const a=i*(SLICES+1)+j,b=a+SLICES+1;idx.push(a,b,a+1,b,b+1,a+1);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
  g.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);return g;
}

// ── Renderer ──────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.xr.enabled=true;
renderer.domElement.style.display='none';
document.body.insertBefore(renderer.domElement,document.getElementById('tap'));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.01,20);

// ── Textura da escultura → imprime forma no shader ────────────
const sculptureTex=new THREE.TextureLoader().load('escultura-mask.png');
sculptureTex.wrapS=sculptureTex.wrapT=THREE.RepeatWrapping;

// ── Shader ────────────────────────────────────────────────────
const mat=new THREE.ShaderMaterial({
  transparent:true,side:THREE.DoubleSide,depthWrite:false,
  blending:THREE.CustomBlending,blendEquation:THREE.AddEquation,
  blendSrc:THREE.SrcAlphaFactor,blendDst:THREE.OneMinusSrcAlphaFactor,
  uniforms:{
    uTime:{value:0},uTouch:{value:-99},uHue:{value:0},
    uReveal:{value:0},uHand:{value:-1},
    uWind:{value:0},           // fase da brisa
    uSculpture:{value:sculptureTex}
  },
  vertexShader:`
    uniform float uTime,uTouch,uReveal,uHand,uWind;
    uniform sampler2D uSculpture;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp,vSculpt;
    float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
    float ns(vec2 p){vec2 i=floor(p),f=fract(p)*fract(p)*(3.-2.*fract(p));
      return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
    void main(){
      vUv=uv;
      // Forma da escultura lida da textura e impressa na superfície
      float sculpt=texture2D(uSculpture,uv*.8+vec2(.1)).r;
      vSculpt=sculpt;
      float sculptDisp=(sculpt-.45)*.055; // empurra onde o metal está presente

      float dt=uTime-uTouch,alive=step(dt,7.);
      float wf=dt*.30,dw=abs(uv.y-wf);
      float tw=exp(-dw*dw*15.)*alive*sin(dt*2.5-uv.y*5.)*max(0.,1.-dt*.13);

      // Brisa: onda que varre periodicamente
      float wind=sin(uTime*.8-uv.y*4.+uWind)*.012*(.5+.5*sin(uTime*.3));

      float br=sin(uTime*.42+uv.y*1.6)*.008+sin(uTime*.25+uv.x*2.1)*.005;
      float lq=(ns(uv*2.+vec2(uTime*.09,uTime*.06))-.5)*.010;

      float d=(tw*.022+br+wind+lq+sculptDisp)*uReveal;
      vDisp=d;
      vN=normalize(normalMatrix*normal);
      vec4 mv=modelViewMatrix*vec4(position+normal*d,1.);
      vV=normalize(-mv.xyz);gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    uniform float uTime,uTouch,uHue,uReveal,uHand,uWind;
    uniform sampler2D uSculpture;
    varying vec3 vN,vV;varying vec2 vUv;varying float vDisp,vSculpt;
    void main(){
      if(uReveal<=0.)discard;
      vec3 N=normalize(vN),V=normalize(vV);
      float NdotV=abs(dot(N,V));
      float rim=pow(1.-NdotV,1.9);
      float core=pow(NdotV,3.5);

      float dt=uTime-uTouch,alive=step(dt,7.);
      float decay=max(0.,1.-dt*.14)*alive;
      float hs=max(0.,1.-uHand*2.5)*step(0.,uHand)*step(uHand,.35);

      float wf=dt*.30;
      float waveGlow=exp(-pow(vUv.y-wf,2.)*14.)*decay;

      // Iridescência modulada pela forma da escultura
      // vSculpt alto = onde o metal está → fase de cor diferente
      float sculptPhase=vSculpt*3.5;
      float ph=rim*7.+vUv.y*3.-uTime*.28+vDisp*38.+uHue+waveGlow*2.+sculptPhase;
      vec3 iri=vec3(.5+.32*cos(ph),.5+.32*cos(ph+2.09),.5+.32*cos(ph+4.19));

      // Aura do metal: base quente, sobe frio
      float metalBase=pow(max(0.,1.-vUv.y*2.5),2.2);
      float metalRise=sin(vUv.y*3.14-uTime*.85)*.5+.5;
      metalRise*=pow(1.-vUv.y,1.5)*.55;
      // Escultura imprime padrão quente onde o metal está
      float sculptHeat=vSculpt*(1.-vUv.y)*.5;
      vec3 metalCol=vec3(.90,.62,.16)*(metalBase*.6+sculptHeat*.4)
                   +vec3(.28,.55,.88)*metalRise*.4;

      float pulse=.5+.5*sin(uTime*1.3);

      // Brisa: shimmer que passa
      float windShimmer=sin(uTime*.8-vUv.y*4.+uWind)*(.5+.5*sin(uTime*.3))*.18;

      vec3 waveCol=iri*waveGlow*1.8;
      vec3 handCol=iri*hs*.5*(.5+.5*sin(uTime*3.+vUv.y*6.));

      vec3 col=iri*(rim*.72+pulse*rim*.2+decay*.4+windShimmer)
              +metalCol+waveCol+handCol
              +vec3(.03,.07,.14)*core*.22;

      float a=(rim*.68+core*.05+waveGlow*.38+hs*.2
              +pulse*rim*.16+metalBase*.10+sculptHeat*.06)*uReveal;
      gl_FragColor=vec4(col,clamp(a,0.,.84));
    }`
});

// ── Halo no chão (campo da escultura) ─────────────────────────
const haloGeo=new THREE.RingGeometry(.05,.55,80);
const haloMat=new THREE.ShaderMaterial({
  transparent:true,depthWrite:false,side:THREE.DoubleSide,
  uniforms:{uTime:{value:0},uReveal:{value:0}},
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`
    uniform float uTime,uReveal;varying vec2 vUv;
    void main(){
      float r=vUv.x; // 0=inner 1=outer (RingGeometry UV)
      float ph=r*5.-uTime*.4;
      vec3 c=vec3(.5+.3*cos(ph),.5+.3*cos(ph+2.09),.5+.3*cos(ph+4.19));
      float pulse=.5+.5*sin(uTime*1.2+r*6.);
      float a=(1.-r)*.22*pulse*uReveal;
      gl_FragColor=vec4(c,clamp(a,0.,.35));
    }`
});
const halo=new THREE.Mesh(haloGeo,haloMat);
halo.rotation.x=-Math.PI/2;
halo.position.y=0.005;
scene.add(halo);

// ── Som: metal wobble sintético ───────────────────────────────
let audioCtx=null;

function startAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function playMetalWobble(vol=1.0){
  if(!audioCtx)return;
  if(audioCtx.state==='suspended')audioCtx.resume();
  const ac=audioCtx,now=ac.currentTime,dur=3.8;

  // LFO que cria o "wobble" — oscilação lenta (4Hz) da chapa
  const lfo=ac.createOscillator();
  lfo.type='sine';lfo.frequency.value=4.2;
  const lfoAmp=ac.createGain();lfoAmp.gain.value=18;
  lfo.connect(lfoAmp);

  // Harmônicos de chapa metálica grave
  [[68,1.0],[136,.60],[204,.38],[312,.22],[520,.10]].forEach(([f,g])=>{
    const osc=ac.createOscillator(),gain=ac.createGain();
    osc.type='sawtooth';osc.frequency.value=f;
    // Conecta LFO à frequência → cria o wobble
    lfoAmp.connect(osc.frequency);
    gain.gain.setValueAtTime(0,now);
    gain.gain.linearRampToValueAtTime(vol*g*.32,now+.06);
    gain.gain.setValueAtTime(vol*g*.32,now+.1);
    gain.gain.exponentialRampToValueAtTime(.0001,now+dur);
    osc.connect(gain);gain.connect(ac.destination);
    osc.start(now);osc.stop(now+dur);
  });
  lfo.start(now);lfo.stop(now+dur);
}

const mesh=new THREE.Mesh(buildGeo(),mat);
scene.add(mesh);

// ── Anel de varredura ─────────────────────────────────────────
const ringMat=new THREE.MeshBasicMaterial({color:0x88ccff,transparent:true,opacity:0,side:THREE.DoubleSide});
const ring=new THREE.Mesh(new THREE.RingGeometry(.20,.25,64),ringMat);
ring.rotation.x=-Math.PI/2;scene.add(ring);

// ── Joints das mãos ───────────────────────────────────────────
const JNAMES=[
  'wrist',
  'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
  'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
  'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
  'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
  'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
];
const TIP_NAMES=new Set(['index-finger-tip','middle-finger-tip','thumb-tip','ring-finger-tip','pinky-finger-tip']);
const handMat=new THREE.MeshBasicMaterial({color:0xaaddff,transparent:true,opacity:.38});
const jointGeo=new THREE.SphereGeometry(.007,8,8);
function makeJoints(){return JNAMES.map(()=>{const s=new THREE.Mesh(jointGeo,handMat);s.visible=false;scene.add(s);return s;});}
const handJointsL=makeJoints(),handJointsR=makeJoints();

const prevD={left:2,right:2};
function ellD(p){
  if(!locked)return 2;
  const lx=(p.x-mesh.position.x)/MAX_RX;
  const ly=(p.y-mesh.position.y)/MAX_RZ;
  const lz=(p.z-mesh.position.z)/(HEIGHT/2);
  return Math.sqrt(lx*lx+ly*ly+lz*lz);
}

let sculptureTarget=null;
fetch('escultura-mask.png').then(r=>r.blob()).then(b=>createImageBitmap(b)).then(bm=>{sculptureTarget=bm;}).catch(()=>{});

let xrSess=null,xrRef=null,hitSrc=null;
let scanning=false,locked=false,scanAccum=0;
const clock=new THREE.Clock();
let hue=0,lastT=0;
let imgFrames=0,imgSX=0,imgSZ=0;

const tapEl=document.getElementById('tap');
const errEl=document.getElementById('err');
function showErr(m){errEl.innerHTML=m;errEl.style.display='block';}

function updateHands(frame,joints,hand,ref,side){
  let minD=-1;
  JNAMES.forEach((name,i)=>{
    const jt=hand.get(name);
    if(!jt){joints[i].visible=false;return;}
    const pose=frame.getJointPose(jt,ref);
    if(!pose){joints[i].visible=false;return;}
    const p=pose.transform.position;
    joints[i].position.set(p.x,p.y,p.z);joints[i].visible=true;
    if(locked){
      const dx=p.x-mesh.position.x,dz=p.z-mesh.position.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(minD<0||d<minD)minD=d;
    }
    if(TIP_NAMES.has(name)&&locked){
      const d=ellD(p);
      const t=clock.getElapsedTime();
      if(prevD[side]>1.05&&d<=1.0){
        playMetalWobble(.9);
        mat.uniforms.uTouch.value=t;
        hue+=Math.PI*.72;mat.uniforms.uHue.value=hue;
      }
      prevD[side]=d<prevD[side]?d:Math.min(2,prevD[side]+.025);
    }
  });
  return minD;
}

function setupSession(session){
  xrSess=session;
  renderer.xr.setReferenceSpaceType('local-floor');
  renderer.xr.setSession(session)
    .then(()=>session.requestReferenceSpace('local-floor'))
    .then(ref=>{
      xrRef=ref;
      return session.requestReferenceSpace('viewer')
        .then(vs=>session.requestHitTestSource({space:vs}))
        .catch(()=>null);
    }).then(hs=>{
      hitSrc=hs;scanning=true;locked=false;scanAccum=0;
      mat.uniforms.uReveal.value=0;haloMat.uniforms.uReveal.value=0;
      lastT=clock.getElapsedTime();
      tapEl.classList.add('hidden');renderer.domElement.style.display='block';
    }).catch(e=>showErr(e.message));

  session.addEventListener('end',()=>{
    xrSess=null;xrRef=null;hitSrc=null;
    scanning=false;locked=false;scanAccum=0;
    mat.uniforms.uReveal.value=0;mat.uniforms.uHand.value=-1;
    haloMat.uniforms.uReveal.value=0;
    ringMat.opacity=0;
    [...handJointsL,...handJointsR].forEach(j=>j.visible=false);
    renderer.domElement.style.display='none';
    tapEl.classList.remove('hidden');
    imgFrames=0;imgSX=0;imgSZ=0;prevD.left=2;prevD.right=2;
  });
}

tapEl.addEventListener('click',()=>{
  if(xrSess)return;
  if(!navigator.xr){showErr('WebXR indisponível');return;}
  startAudio();
  const opts={
    requiredFeatures:['local-floor'],
    optionalFeatures:['hit-test','hand-tracking','dom-overlay'],
    domOverlay:{root:document.body}
  };
  if(sculptureTarget){
    opts.optionalFeatures.push('image-tracking');
    opts.trackedImages=[{image:sculptureTarget,widthInMeters:.45}];
  }
  navigator.xr.requestSession('immersive-ar',opts)
    .then(setupSession)
    .catch(e=>alert('Erro: '+(e.message||e)));
});

renderer.setAnimationLoop((ts,frame)=>{
  const t=clock.getElapsedTime();
  const dt=Math.min(t-lastT,.05);lastT=t;
  mat.uniforms.uTime.value=t;
  mat.uniforms.uWind.value=t*.6; // fase da brisa avança
  haloMat.uniforms.uTime.value=t;

  if(frame&&xrRef){

    if(frame.getImageTrackingResults&&!locked){
      for(const r of frame.getImageTrackingResults()){
        if(r.trackingState==='tracked'){
          const pose=frame.getPose(r.imageSpace,xrRef);
          if(pose&&pose.transform.position.y<.25){
            imgFrames++;imgSX+=pose.transform.position.x;imgSZ+=pose.transform.position.z;
            if(imgFrames>=30){
              const px=imgSX/30,pz=imgSZ/30;
              mesh.position.set(px,0,pz);
              halo.position.set(px,.005,pz);
              locked=true;scanning=false;ringMat.opacity=0;
              if(hitSrc){hitSrc.cancel();hitSrc=null;}
            }
          } else {imgFrames=0;imgSX=0;imgSZ=0;}
        }
      }
    }

    if(scanning&&hitSrc){
      const hits=frame.getHitTestResults(hitSrc);
      if(hits.length>0){
        const p=hits[0].getPose(xrRef);
        if(p){
          const px=p.transform.position.x,py=p.transform.position.y,pz=p.transform.position.z;
          ring.position.set(px,py+.003,pz);
          scanAccum+=dt;
          ringMat.opacity=(0.4+Math.min(scanAccum/1.5,.6))*(.7+.3*Math.sin(t*6));
          ring.scale.setScalar(1+.06*Math.sin(t*5));
          if(scanAccum>=1.5){
            mesh.position.set(px,py,pz);
            halo.position.set(px,py+.005,pz);
            scanning=false;locked=true;
            if(hitSrc){hitSrc.cancel();hitSrc=null;}
          }
        }
      } else {scanAccum=Math.max(0,scanAccum-dt*2);ringMat.opacity=Math.max(0,ringMat.opacity-dt*2);}
    }

    if(locked){
      ringMat.opacity=Math.max(0,ringMat.opacity-dt*3);
      const rev=Math.min(1,mat.uniforms.uReveal.value+dt*.4);
      mat.uniforms.uReveal.value=rev;
      haloMat.uniforms.uReveal.value=rev;
    }

    const sess=renderer.xr.getSession();
    let minD=-1;
    for(const src of sess.inputSources){
      if(src.hand){
        const side=src.handedness==='left'?'left':'right';
        const joints=src.handedness==='left'?handJointsL:handJointsR;
        const d=updateHands(frame,joints,src.hand,xrRef,side);
        if(d>=0&&(minD<0||d<minD))minD=d;
      }
    }
    mat.uniforms.uHand.value=minD;
  }

  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
